// ── Week helpers ──────────────────────────────────────────────
function getISOWeek(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  var y = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - y) / 86400000 + 1) / 7);
}
function getMondayOfWeek(offset) {
  var today = new Date();
  var day = today.getDay() || 7;
  var monday = new Date(today);
  monday.setDate(today.getDate() - day + 1 + offset * 7);
  monday.setHours(0, 0, 0, 0);
  return monday;
}
function fmtDate(d) {
  return d.getFullYear() + '/' +
    String(d.getMonth() + 1).padStart(2, '0') + '/' +
    String(d.getDate()).padStart(2, '0');
}
function isoDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Populate week selector (current + 3 past weeks for reporting) ─
var weekSel    = document.getElementById('weekSelect');
var DAY_SHORTS = ['MON', 'TUE', 'WED', 'THU', 'FRI'];

for (var w = -3; w <= 0; w++) {
  var mon = getMondayOfWeek(w);
  var fri = new Date(mon); fri.setDate(mon.getDate() + 4);
  var opt = document.createElement('option');
  opt.value = w;
  opt.textContent = '第' + getISOWeek(mon) + '週　' +
    fmtDate(mon) + '（月）～' + fmtDate(fri) + '（金）';
  if (w === 0) opt.selected = true;
  weekSel.appendChild(opt);
}

// ── State ─────────────────────────────────────────────────────
var selectedDayIdx = null;
var myTaskReports  = [];
var dayData        = makeFreshDayData();

function makeFreshDayData() {
  return [0,1,2,3,4].map(function () {
    return { importantIssues: '', nextDayPlan: '', redmineTasks: [], edited: false, savedStatus: null };
  });
}

// ── Load task reports on page load ────────────────────────────
google.script.run
  .withSuccessHandler(function (data) {
    if (data && !data.error) myTaskReports = data;
    renderWeek();
  })
  .withFailureHandler(function () { renderWeek(); })
  .getMyTaskReports();

// ── Reset on week change ──────────────────────────────────────
weekSel.addEventListener('change', function () {
  selectedDayIdx = null;
  dayData = makeFreshDayData();
  document.getElementById('detailDateLabel').textContent = '日を選択してください';
  document.getElementById('detailPanel').innerHTML =
    '<p class="text-sm text-slate-400">左のカレンダーから報告する日を選択してください。</p>';
  renderWeek();
  google.script.run
    .withSuccessHandler(function (data) {
      if (data && !data.error) {
        myTaskReports = data;
        dayData = makeFreshDayData();
        renderWeek();
      }
    })
    .getMyTaskReports();
});

// ── Render week ───────────────────────────────────────────────
function renderWeek() {
  var offset = parseInt(weekSel.value) || 0;
  var mon    = getMondayOfWeek(offset);
  var fri    = new Date(mon); fri.setDate(mon.getDate() + 4);
  var weekNo = getISOWeek(mon);

  document.getElementById('weekLabel').textContent = '第' + weekNo + '週';
  document.getElementById('weekRange').textContent = fmtDate(mon) + ' ～ ' + fmtDate(fri);
  document.getElementById('monthLabel').textContent =
    mon.getFullYear() + '年' + String(mon.getMonth() + 1).padStart(2, '0') + '月';

  // Match task reports to days
  var prevDayData = dayData;
  var tempData = makeFreshDayData();
  for (var i = 0; i < 5; i++) {
    var d = new Date(mon); d.setDate(mon.getDate() + i);
    var dStr = isoDate(d);
    var match = myTaskReports.find(function (r) { return r.report_date === dStr; });
    if (match) {
      tempData[i].importantIssues = match.important_issues || '';
      tempData[i].nextDayPlan     = match.next_day_plan || '';
      tempData[i].redmineTasks    = match.redmineTasks || [];
      tempData[i].edited          = true;
      tempData[i].savedStatus     = match.status;
    }
  }
  // Preserve optimistic state
  for (var k = 0; k < 5; k++) {
    if (prevDayData[k] && prevDayData[k].savedStatus && !tempData[k].savedStatus) {
      tempData[k] = prevDayData[k];
    } else if (prevDayData[k] && prevDayData[k].savedStatus &&
               tempData[k].savedStatus &&
               _statusRank(prevDayData[k].savedStatus) > _statusRank(tempData[k].savedStatus)) {
      tempData[k].savedStatus = prevDayData[k].savedStatus;
    }
  }
  dayData = tempData;

  var container = document.getElementById('dayCards');
  container.innerHTML = '';
  for (var j = 0; j < 5; j++) {
    var dd = new Date(mon); dd.setDate(mon.getDate() + j);
    container.appendChild(makeDayCard(dd, DAY_SHORTS[j], j));
  }
}

// ── Status helpers ────────────────────────────────────────────
function statusBadgeHtml(status) {
  var map = {
    none:              { label: '未作成', cls: 'bg-slate-100 text-slate-700' },
    draft:             { label: '作製中', cls: 'bg-blue-100 text-blue-700' },
    submitted:         { label: '申請中', cls: 'bg-orange-100 text-orange-700' },
    reviewer_approved: { label: '確認中', cls: 'bg-yellow-100 text-yellow-700' },
    approved:          { label: '承認済', cls: 'bg-green-100 text-green-700' },
    rejected:          { label: '差戻し',   cls: 'bg-red-100 text-red-700' },
  };
  var s = map[status] || map.none;
  return '<span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-medium ' +
    s.cls + '">' + s.label + '</span>';
}
function _statusRank(s) {
  var ranks = { none: 0, draft: 1, submitted: 2, reviewer_approved: 3, approved: 4, rejected: 0 };
  return ranks[s] || 0;
}

// ── Day card ──────────────────────────────────────────────────
function makeDayCard(d, dayShort, idx) {
  var div = document.createElement('div');
  var dayStatus = (dayData[idx] && dayData[idx].savedStatus) ? dayData[idx].savedStatus : 'none';

  div.className = [
    'flex items-start justify-between p-4 bg-white border rounded-lg cursor-pointer transition-all hover:shadow-md',
    selectedDayIdx === idx ? 'border-blue-400 border-2' : 'border-slate-200',
  ].join(' ');

  div.innerHTML =
    '<div class="flex items-center gap-4">' +
      '<div class="flex flex-col items-center justify-center border-slate-300 border-2 p-2 bg-blue-50 rounded-md min-w-16 h-16">' +
        '<span class="text-2xl font-bold text-slate-900">' + d.getDate() + '</span>' +
        '<span class="text-xs font-medium text-amber-900 uppercase mt-1">' + dayShort + '</span>' +
      '</div>' +
      '<div>' + statusBadgeHtml(dayStatus) + '</div>' +
    '</div>';

  div.addEventListener('click', function () {
    selectedDayIdx = idx;
    renderWeek();
    openDetailPanel(d, dayShort, idx);
  });
  return div;
}

// ── Render Redmine time entry tasks ───────────────────────────
function renderRedmineTasks(idx, tasks, fromSavedData) {
  var container = document.getElementById('redmineList_' + idx);
  if (!container) return;
  if (!tasks || tasks.length === 0) { container.innerHTML = ''; return; }

  if (fromSavedData) {
    container.innerHTML = '<p class="text-xs text-slate-600 mb-2 font-semibold">記録された作業実績:</p>' +
      tasks.map(function (t) {
        return '<div class="text-xs bg-white border border-green-300 rounded px-3 py-2 text-slate-700">' +
          '<div class="flex items-center gap-2">' +
            '<span class="text-green-600">✓</span>' +
            '<div class="flex-1">' +
              '<span class="font-medium">#' + escapeHtml(String(t.id || '')) + '</span> ' +
              '<span>' + escapeHtml(t.subject || '') + '</span>' +
              '<div class="flex gap-3 mt-1 text-slate-500">' +
                (t.project ? '<span>' + escapeHtml(t.project) + '</span>' : '') +
                '<span>⏱ ' + (t.hours || 0) + 'h</span>' +
                '<span>進捗: ' + (t.progress || 0) + '%</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    return;
  }

  // Fresh sync — read-only display (not selectable, auto-included)
  container.innerHTML = '<p class="text-xs text-slate-600 mb-2 font-semibold">本日の作業実績 (' + tasks.length + '件):</p>' +
    tasks.map(function (t) {
      return '<div class="text-xs bg-white border border-blue-200 rounded px-3 py-2 text-slate-700">' +
        '<div class="flex items-start gap-2">' +
          '<span class="text-blue-500 mt-0.5">📋</span>' +
          '<div class="flex-1">' +
            '<div class="font-medium text-slate-900">#' + escapeHtml(String(t.id)) + ' ' + escapeHtml(t.subject) + '</div>' +
            '<div class="flex flex-wrap gap-x-3 gap-y-1 mt-1 text-slate-500">' +
              (t.project  ? '<span>' + escapeHtml(t.project) + '</span>'   : '') +
              (t.tracker  ? '<span>' + escapeHtml(t.tracker) + '</span>'   : '') +
              (t.status   ? '<span>' + escapeHtml(t.status) + '</span>'    : '') +
              '<span class="font-medium text-blue-700">⏱ ' + (t.hours || 0) + 'h</span>' +
              '<span class="font-medium text-emerald-700">進捗: ' + (t.progress || 0) + '%</span>' +
            '</div>' +
            (t.comments && t.comments.length > 0
              ? '<div class="mt-1 text-slate-400 italic">' + escapeHtml(t.comments.join(', ')) + '</div>'
              : '') +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
}

// ── Sync Redmine time entries ─────────────────────────────────
function syncRedmineEntries(idx, dateStr) {
  var btn = document.getElementById('syncBtn_' + idx);
  if (!btn) return;
  btn.textContent = '同期中...';
  btn.disabled = true;
  google.script.run
    .withSuccessHandler(function (result) {
      var msgEl = document.getElementById('redmineList_' + idx);
      if (result && !Array.isArray(result) && result.error) {
        if (msgEl) msgEl.innerHTML = '<p class="text-xs text-red-600 italic">' + escapeHtml(result.error) + '</p>';
        btn.textContent = 'Redmine実績と同期';
        btn.disabled = false;
        return;
      }
      var tasks = Array.isArray(result) ? result : [];
      dayData[idx].redmineTasks = tasks; // auto-include all entries
      if (tasks.length === 0) {
        if (msgEl) msgEl.innerHTML = '<p class="text-xs text-slate-500 italic">この日の作業実績が見つかりません</p>';
        btn.textContent = 'Redmine実績と同期';
        btn.disabled = false;
        return;
      }
      renderRedmineTasks(idx, tasks, false);
      btn.textContent = 'Redmine実績を再読み込み';
      btn.disabled = false;
    })
    .withFailureHandler(function (err) {
      var msgEl = document.getElementById('redmineList_' + idx);
      if (msgEl) {
        msgEl.innerHTML = '<p class="text-xs text-red-600 italic">同期エラー: ' +
          escapeHtml(String(err && err.message ? err.message : '不明なエラー')) + '</p>';
      }
      btn.textContent = 'Redmine実績と同期';
      btn.disabled = false;
    })
    .getRedmineTimeEntries(dateStr);
}

// ── Save day draft ────────────────────────────────────────────
function saveTaskDay(idx) {
  var ii = document.getElementById('importantIssues_' + idx);
  var np = document.getElementById('nextDayPlan_' + idx);
  if (!ii || !np) return;

  dayData[idx].importantIssues = ii.value;
  dayData[idx].nextDayPlan     = np.value;
  dayData[idx].edited          = true;
  dayData[idx].savedStatus     = 'draft';

  var offset = parseInt(weekSel.value) || 0;
  var mon    = getMondayOfWeek(offset);
  var date   = new Date(mon); date.setDate(mon.getDate() + idx);

  var payload = {
    date:            isoDate(date),
    dayShort:        DAY_SHORTS[idx],
    importantIssues: dayData[idx].importantIssues,
    nextDayPlan:     dayData[idx].nextDayPlan,
    redmineTasks:    dayData[idx].redmineTasks || [],
  };

  renderWeek();
  openDetailPanel(date, DAY_SHORTS[idx], idx);
  showDayMsg(idx, '保存中...', true);

  google.script.run
    .withSuccessHandler(function (r) {
      if (r && r.error) {
        dayData[idx].savedStatus = null;
        dayData[idx].edited = false;
        renderWeek();
        openDetailPanel(date, DAY_SHORTS[idx], idx);
        showDayMsg(idx, r.error, false);
        return;
      }
      showDayMsg(idx, '💾 下書き保存しました', true);
      google.script.run
        .withSuccessHandler(function (data) {
          if (data && !data.error) {
            myTaskReports = data;
            renderWeek();
            if (selectedDayIdx === idx) openDetailPanel(date, DAY_SHORTS[idx], idx);
          }
        })
        .getMyTaskReports();
    })
    .withFailureHandler(function () {
      dayData[idx].savedStatus = null;
      dayData[idx].edited = false;
      renderWeek();
      openDetailPanel(date, DAY_SHORTS[idx], idx);
      showDayMsg(idx, '保存に失敗しました', false);
    })
    .saveTaskReportDraft(payload);
}

// ── Submit single day ─────────────────────────────────────────
function submitTaskDay(idx) {
  var ii = document.getElementById('importantIssues_' + idx);
  var np = document.getElementById('nextDayPlan_' + idx);

  var offset = parseInt(weekSel.value) || 0;
  var mon    = getMondayOfWeek(offset);
  var date   = new Date(mon); date.setDate(mon.getDate() + idx);

  // If not yet saved, save as draft first then submit
  if (!dayData[idx].savedStatus || dayData[idx].savedStatus === 'none') {
    if (!ii || !np) return;
    dayData[idx].importantIssues = ii.value;
    dayData[idx].nextDayPlan     = np.value;
    dayData[idx].edited          = true;
    dayData[idx].savedStatus     = 'draft';

    var draftPayload = {
      date:            isoDate(date),
      dayShort:        DAY_SHORTS[idx],
      importantIssues: dayData[idx].importantIssues,
      nextDayPlan:     dayData[idx].nextDayPlan,
      redmineTasks:    dayData[idx].redmineTasks || [],
    };

    renderWeek();
    openDetailPanel(date, DAY_SHORTS[idx], idx);
    showDayMsg(idx, '保存して申請中...', true);

    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.error) {
          dayData[idx].savedStatus = null;
          renderWeek();
          openDetailPanel(date, DAY_SHORTS[idx], idx);
          showDayMsg(idx, r.error, false);
          return;
        }
        // Now submit
        _doSubmit(idx, date);
      })
      .withFailureHandler(function () {
        dayData[idx].savedStatus = null;
        renderWeek();
        openDetailPanel(date, DAY_SHORTS[idx], idx);
        showDayMsg(idx, '保存に失敗しました', false);
      })
      .saveTaskReportDraft(draftPayload);
    return;
  }

  if (dayData[idx].savedStatus === 'draft') {
    // Save latest edits first
    if (ii && np) {
      dayData[idx].importantIssues = ii.value;
      dayData[idx].nextDayPlan     = np.value;
    }
    var updatePayload = {
      date:            isoDate(date),
      dayShort:        DAY_SHORTS[idx],
      importantIssues: dayData[idx].importantIssues,
      nextDayPlan:     dayData[idx].nextDayPlan,
      redmineTasks:    dayData[idx].redmineTasks || [],
    };
    renderWeek();
    openDetailPanel(date, DAY_SHORTS[idx], idx);
    showDayMsg(idx, '申請中...', true);

    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.error) { showDayMsg(idx, r.error, false); return; }
        _doSubmit(idx, date);
      })
      .withFailureHandler(function () { showDayMsg(idx, '保存に失敗しました', false); })
      .saveTaskReportDraft(updatePayload);
    return;
  }

  showDayMsg(idx, 'この日報は既に申請済みです', false);
}

function _doSubmit(idx, date) {
  var payload = { date: isoDate(date) };
  dayData[idx].savedStatus = 'submitted';
  renderWeek();
  openDetailPanel(date, DAY_SHORTS[idx], idx);

  google.script.run
    .withSuccessHandler(function (r) {
      if (r && r.error) {
        dayData[idx].savedStatus = 'draft';
        renderWeek();
        openDetailPanel(date, DAY_SHORTS[idx], idx);
        showDayMsg(idx, r.error, false);
        return;
      }
      showDayMsg(idx, '✅ 日報を申請しました', true);
      google.script.run
        .withSuccessHandler(function (data) {
          if (data && !data.error) {
            myTaskReports = data;
            renderWeek();
            if (selectedDayIdx === idx) openDetailPanel(date, DAY_SHORTS[idx], idx);
          }
        })
        .getMyTaskReports();
    })
    .withFailureHandler(function () {
      dayData[idx].savedStatus = 'draft';
      renderWeek();
      openDetailPanel(date, DAY_SHORTS[idx], idx);
      showDayMsg(idx, '申請に失敗しました', false);
    })
    .submitTaskReport(payload);
}

function cancelTaskDay(idx) {
  selectedDayIdx = null;
  document.getElementById('detailDateLabel').textContent = '日を選択してください';
  document.getElementById('detailPanel').innerHTML =
    '<p class="text-sm text-slate-400">左のカレンダーから報告する日を選択してください。</p>';
  renderWeek();
}

function showDayMsg(idx, msg, ok) {
  var el = document.getElementById('dayMsg_' + idx);
  if (!el) return;
  el.textContent = msg;
  el.className = 'mt-3 text-sm text-center p-2 rounded-md ' +
    (ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700');
  el.classList.remove('hidden');
  setTimeout(function () { el.classList.add('hidden'); }, 2500);
}

// ── Logout ────────────────────────────────────────────────────
function logout() {
  document.getElementById('pageLoader').classList.remove('hidden');
  google.script.run
    .withSuccessHandler(function (r) { window.top.location.href = r.redirectUrl; })
    .logoutUser();
}
</script>
