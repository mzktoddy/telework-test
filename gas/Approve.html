<script>
// ── Read GAS template vars from DOM ──────────────────────────

var APP_USER   = JSON.parse(_gasEl.getAttribute('data-user') || 'null');
var SCRIPT_URL = _gasEl.getAttribute('data-url') || '';

// ── Sidebar ───────────────────────────────────────────────────

  document.getElementById('sidebarEmail').textContent = APP_USER.email;

  var items = [
    {

    },
    {

      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/>',

    });
    items.push({
      label: '申請履歴', page: 'admin_history', color: 'text-red-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>',

// ── State ─────────────────────────────────────────────────────
var allReports     = [];
var selectedReport = null;
var isProcessing   = false; // 照査・承認・差戴の処理中は true
var _teleworkLoaded = false;
var _taskLoaded     = false;
var _deptsLoaded    = false;
var _teleworkData   = [];
var _taskData       = [];
var _departments    = [];

// ── Load data in parallel ─────────────────────────────────────
google.script.run
  .withSuccessHandler(function (data) {
    _teleworkData = (data && !data.error) ? data.map(function (r) { r._type = 'telework'; return r; }) : [];
    _teleworkLoaded = true;
    _tryFinishLoad();
  })
  .withFailureHandler(function () { _teleworkLoaded = true; _tryFinishLoad(); })
  .getPendingReports();

google.script.run
  .withSuccessHandler(function (data) {
    _taskData = (data && !data.error) ? data.map(function (r) { r._type = 'task_report'; return r; }) : [];
    _taskLoaded = true;
    _tryFinishLoad();
  })
  .withFailureHandler(function () { _taskLoaded = true; _tryFinishLoad(); })
  .getPendingTaskReports();

google.script.run
  .withSuccessHandler(function (data) {
    _departments = (data && !data.error) ? data : [];
    _deptsLoaded = true;
    _tryFinishLoad();
  })
  .withFailureHandler(function () { _deptsLoaded = true; _tryFinishLoad(); })
  .getApproveDepartments();

function _tryFinishLoad() {
  if (!_teleworkLoaded || !_taskLoaded || !_deptsLoaded) return;
  document.getElementById('listLoading').classList.add('hidden');
  allReports = _teleworkData.concat(_taskData);
  if (!allReports.length) { showListEmpty(); return; }
  populateDeptFilter();
  renderList();
}

function showListEmpty() {
  document.getElementById('listEmpty').classList.remove('hidden');
}

// ── アクション結果の即時適用ヘルパー ─────────────────────────
// サーバーが返した保留リストでローカル状態を更新し、
// 余分なサーバーラウンドトリップ（reloadReports）を不要にする
function _applyPendingResult(r, actedId, actionType) {
  // サーバーから返却された保留リストでローカルデータを更新
  if (r.pendingReports) {
    _teleworkData = r.pendingReports.map(function(x) { x._type = 'telework'; return x; });
  }
  if (r.pendingTaskReports) {
    _taskData = r.pendingTaskReports.map(function(x) { x._type = 'task_report'; return x; });
  }
  allReports = _teleworkData.concat(_taskData);
  selectedReport = null;

  if (actionType === 'review') {
    // 照査後: リポートはリストに残る（マネージャーが承認可能）→ 更新後のデータで再開
    var updated = allReports.filter(function(x) { return x.id === actedId; })[0];
    if (updated) {
      selectedReport = updated;
      renderList();
      if (updated._type === 'task_report') openTaskReportDetail(updated);
      else openTeleworkDetail(updated);
    } else {
      // フィルタリングにより非表示になった場合（例：レビュアーがレビュー済みを見られない）
      if (!allReports.length) { document.getElementById('requestList').innerHTML = ''; showListEmpty(); }
      else renderList();
      document.getElementById('detailSidebar').innerHTML =
        '<div class="p-6 border-b border-slate-100"><h2 class="text-lg font-semibold text-slate-900">申請詳細</h2>' +
        '<p class="text-xs text-slate-500 mt-1">照査が完了しました</p></div>' +
        '<div class="flex-1 p-6"><p class="text-sm text-slate-400">左のリストから次の申請を選択してください。</p></div>';
    }
  } else {
    // 承認・差戻し後: リポートはリストから消える → 完了メッセージを表示
    if (!allReports.length) { document.getElementById('requestList').innerHTML = ''; showListEmpty(); }
    else renderList();
    var msgText = actionType === 'approve' ? '承認しました' : '差戻ししました';
    document.getElementById('detailSidebar').innerHTML =
      '<div class="flex flex-col items-center justify-center gap-3 h-full p-8 text-center">' +
        '<div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">' +
          '<svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>' +
          '</svg>' +
        '</div>' +
        '<p class="text-sm font-semibold text-green-700">' + msgText + '</p>' +
        '<p class="text-xs text-slate-400">リストから次の申請を選択してください</p>' +
      '</div>';
  }
}

// ── Department filter ─────────────────────────────────────────
function populateDeptFilter() {
  var sel = document.getElementById('deptFilter');
  _departments.forEach(function (d) {
    var o = document.createElement('option');
    o.value = d.name;
    o.textContent = d.name;
    sel.appendChild(o);
  });
  sel.addEventListener('change', renderList);
  document.getElementById('statusFilter').addEventListener('change', renderList);
  document.getElementById('typeFilter').addEventListener('change', renderList);
}

// ── Render list ───────────────────────────────────────────────
function renderList() {
  var dept   = document.getElementById('deptFilter').value;
  var status = document.getElementById('statusFilter').value;
  var type   = document.getElementById('typeFilter').value;
  var filtered = allReports.filter(function (r) {
    // 従業員の␍所属部署に部署名が含まれるかチェック（複数部署所属者に対応）
    if (dept !== 'all') {
      var empDepts = (r.employee_department || '').split(',').map(function(d) { return d.trim(); });
      if (empDepts.indexOf(dept) === -1) return false;
    }
    if (status !== 'all' && r.status !== status) return false;
    if (type !== 'all' && r._type !== type) return false;
    return true;
  });
  document.getElementById('pendingCount').textContent = filtered.length;
  var list = document.getElementById('requestList');
  list.innerHTML = '';

  if (!filtered.length) { showListEmpty(); return; }
  document.getElementById('listEmpty').classList.add('hidden');

  filtered.forEach(function (r) {
    list.appendChild(makeRequestCard(r));
  });
}

var STATUS_MAP = {
  submitted:  { label: '申請中',   cls: 'bg-orange-100 text-orange-700' },
  reviewed:   { label: '照査済',   cls: 'bg-yellow-100 text-yellow-700' },
  approved:   { label: '承認済',   cls: 'bg-green-100 text-green-700' },
  rejected:   { label: '差戻し',   cls: 'bg-red-100 text-red-700' },
  draft:      { label: '下書き',   cls: 'bg-slate-100 text-slate-600' },
  none:       { label: '不明',     cls: 'bg-blue-100 text-blue-700' },
};

function statusBadge(status) {
  var s = STATUS_MAP[status] || STATUS_MAP.none;
  return '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium ' + s.cls + '">' + s.label + '</span>';
}

// ステータスとロールに応じた承認ボタンを返す
function getApprovalButton(report) {
  var status = report.status;
  var userRole = APP_USER.role;
  
  // 在宅勤務申請（週単位）の場合、tasksの状態を確認する
  var hasSubmittedTask = false;
  var hasReviewedTask = false;
  if (Array.isArray(report.tasks)) {
    hasSubmittedTask = report.tasks.some(function(t) { return t.status === 'submitted'; });
    hasReviewedTask = report.tasks.some(function(t) { return t.status === 'reviewed'; });
  }
  
  // ステータスが submitted（提出済み）の場合: 「照査」ボタンを表示する
  if (status === 'submitted') {
    return '<button id="actionApproveBtn" onclick="doReview(\'' + report.id + '\')" ' +
      'class="flex-1 h-10 bg-slate-900 hover:bg-slate-800 text-white rounded-full text-sm font-medium transition-colors">' +
      '照査 ✓' +
    '</button>';
  }
  
  // ステータスが reviewed（照査済み）の場合
  if (status === 'reviewed') {
    // 照査者の場合: 週内に submitted タスクがあれば照査ボタンを表示
    if (userRole === 'reviewer') {
      if (hasSubmittedTask) {
        return '<button id="actionApproveBtn" onclick="doReview(\'' + report.id + '\')" ' +
          'class="flex-1 h-10 bg-slate-900 hover:bg-slate-800 text-white rounded-full text-sm font-medium transition-colors">' +
          '照査 ✓' +
        '</button>';
      } else {
        // submitted タスクがない場合は承認待ち
        return '<button disabled class="flex-1 h-10 bg-slate-300 text-slate-500 rounded-full text-sm font-medium cursor-not-allowed">' +
          '承認待ち' +
        '</button>';
      }
    }
    // マネージャー・管理者の場合
    if (userRole === 'manager' || userRole === 'admin') {
      // 週内に submitted タスクがある場合は照査ボタンを優先表示
      if (hasSubmittedTask) {
        return '<button id="actionApproveBtn" onclick="doReview(\'' + report.id + '\')" ' +
          'class="flex-1 h-10 bg-slate-900 hover:bg-slate-800 text-white rounded-full text-sm font-medium transition-colors">' +
          '照査 ✓' +
        '</button>';
      }
      // submitted タスクがなく reviewed タスクのみの場合は承認ボタン
      return '<button id="actionApproveBtn" onclick="doApprove(\'' + report.id + '\')" ' +
        'class="flex-1 h-10 bg-slate-900 hover:bg-slate-800 text-white rounded-full text-sm font-medium transition-colors">' +
        '承認 ✓' +
      '</button>';
    }
  }
  
  // デフォルト: 承認ボタンを表示する（下位互换性のため）
  return '<button id="actionApproveBtn" onclick="doApprove(\'' + report.id + '\')" ' +
    'class="flex-1 h-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-full text-sm font-medium transition-colors">' +
    '承認 ✓' +
  '</button>';
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function makeRequestCard(r) {
  var s   = STATUS_MAP[r.status] || STATUS_MAP.none;
  var initials = r.employee_name ? r.employee_name.charAt(0) : '?';
  var card = document.createElement('div');
  var isSelected = selectedReport && selectedReport.id === r.id;
  card.className = [
    'bg-white border rounded-xl p-5 cursor-pointer transition-all hover:shadow-md',
    isSelected ? 'border-blue-400 border-2' : 'border-slate-200',
  ].join(' ');

  var typeLabel = r._type === 'task_report'
    ? '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-orange-50 text-orange-700 mr-1">日報</span>'
    : '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-blue-50 text-blue-700 mr-1">在宅勤務</span>';

  if (r._type === 'task_report') {
    // 日報（作業報告書）カード —● 単日
    card.innerHTML =
      '<div class="flex items-start gap-4">' +
        '<div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-sm font-bold text-slate-700 flex-shrink-0">' +
          initials +
        '</div>' +
        '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center justify-between gap-2">' +
            '<p class="text-sm font-semibold text-slate-900 truncate">' + escapeHtml(r.employee_name) + '</p>' +

function doReview(reportId) {
  var comment = (document.getElementById('approverComment') || {}).value || '';
  var isTaskReport = selectedReport && selectedReport._type === 'task_report';

  isProcessing = true;
  var approveBtn = document.getElementById('actionApproveBtn');
  var approveBtnOrig = approveBtn ? approveBtn.innerHTML : null;
  if (approveBtn) {
    approveBtn.disabled = true;
    approveBtn.innerHTML = '<div class="flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>照査中...</div>';
  }

  if (isTaskReport) {
    google.script.run
      .withSuccessHandler(function (r) {
        isProcessing = false;
        if (approveBtn && approveBtnOrig) { approveBtn.disabled = false; approveBtn.innerHTML = approveBtnOrig; }
        if (r && r.error) { _restoreDetailIfProcessing(); showActionMsg(r.error, false); return; }
        // サーバーが返した保留リストで即座に更新（reloadReports不要）
        _applyPendingResult(r, reportId, 'review');
      })
      .withFailureHandler(function () {
        isProcessing = false;
        if (approveBtn && approveBtnOrig) { approveBtn.disabled = false; approveBtn.innerHTML = approveBtnOrig; }
        _restoreDetailIfProcessing();
        showActionMsg('エラーが発生しました', false);
      })
      .reviewTaskReportAction(reportId, comment);
  } else {
    if (!selectedReport || !selectedReport.tasks || !selectedReport.tasks.length) {
      isProcessing = false;
      if (approveBtn && approveBtnOrig) { approveBtn.disabled = false; approveBtn.innerHTML = approveBtnOrig; }
      showActionMsg('申請日が見つかりません', false);
      return;
    }
    // 照査者の場合、submitted状態のタスクのみを照査対象とする
    var dayIds = selectedReport.tasks
      .filter(function(t) { return t.status === 'submitted'; })
      .map(function(t) { return t.id; });
    
    if (dayIds.length === 0) {
      isProcessing = false;
      if (approveBtn && approveBtnOrig) { approveBtn.disabled = false; approveBtn.innerHTML = approveBtnOrig; }
      showActionMsg('照査可能な申請がありません', false);
      return;
    }
    
    google.script.run
      .withSuccessHandler(function (r) {
        isProcessing = false;
        if (approveBtn && approveBtnOrig) { approveBtn.disabled = false; approveBtn.innerHTML = approveBtnOrig; }
        if (r && r.error) { _restoreDetailIfProcessing(); showActionMsg('エラー: ' + r.error, false); return; }
        // サーバーが返した保留リストで即座に更新（reloadReports不要）
        _applyPendingResult(r, reportId, 'review');
      })
      .withFailureHandler(function () {
        isProcessing = false;
        if (approveBtn && approveBtnOrig) { approveBtn.disabled = false; approveBtn.innerHTML = approveBtnOrig; }
        _restoreDetailIfProcessing();
        showActionMsg('エラーが発生しました', false);
      })
      .reviewWeekReport(dayIds, comment);
  }
}

function showActionMsg(msg, ok) {

// 処理完了後に詳細パネルを復元する（処理中表示が出ている場合）
function _restoreDetailIfProcessing() {
  var sidebar = document.getElementById('detailSidebar');
  if (sidebar.getAttribute('data-processing') !== '1') return;
  sidebar.removeAttribute('data-processing');
  if (selectedReport) {
    if (selectedReport._type === 'task_report') openTaskReportDetail(selectedReport);
    else openTeleworkDetail(selectedReport);
  } else {
    sidebar.innerHTML =
      '<div class="p-6 border-b border-slate-100">' +
        '<h2 class="text-lg font-semibold text-slate-900">申請詳細</h2>' +
        '<p class="text-xs text-slate-500 mt-1">リクエストを選択してください</p>' +
      '</div>' +
      '<div class="flex-1 p-6">' +
        '<p class="text-sm text-slate-400">左のリストからリクエストを選択してください。</p>' +
      '</div>';
  }
}

function reloadReports() {
  allReports     = [];
  selectedReport = null;
  _teleworkLoaded = false;
  _taskLoaded     = false;
  _teleworkData   = [];
  _taskData       = [];
  document.getElementById('requestList').innerHTML = '';
  document.getElementById('listLoading').classList.remove('hidden');
  document.getElementById('listEmpty').classList.add('hidden');

  google.script.run
    .withSuccessHandler(function (data) {
      _teleworkData = (data && !data.error) ? data.map(function (r) { r._type = 'telework'; return r; }) : [];
      _teleworkLoaded = true;
      _tryReloadFinish();
    })
    .withFailureHandler(function () { _teleworkLoaded = true; _tryReloadFinish(); })
    .getPendingReports();

  google.script.run
    .withSuccessHandler(function (data) {
      _taskData = (data && !data.error) ? data.map(function (r) { r._type = 'task_report'; return r; }) : [];
      _taskLoaded = true;
      _tryReloadFinish();
    })
    .withFailureHandler(function () { _taskLoaded = true; _tryReloadFinish(); })
    .getPendingTaskReports();
}

function _tryReloadFinish() {
  if (!_teleworkLoaded || !_taskLoaded) return;
  document.getElementById('listLoading').classList.add('hidden');
  allReports = _teleworkData.concat(_taskData);
  if (!allReports.length) { showListEmpty(); return; }
  renderList();
  document.getElementById('detailSidebar').innerHTML =
    '<div class="p-6 border-b border-slate-100">' +
      '<h2 class="text-lg font-semibold text-slate-900">申請詳細</h2>' +
      '<p class="text-xs text-slate-500 mt-1">リクエストを選択してください</p>' +
    '</div>' +
    '<div class="flex-1 p-6">' +
      '<p class="text-sm text-slate-400">左のリストからリクエストを選択してください。</p>' +
    '</div>';
}

// ── Logout ────────────────────────────────────────────────────
function logout() {
  document.getElementById('pageLoader').classList.remove('hidden');
  google.script.run
    .withSuccessHandler(function (r) { window.top.location.href = r.redirectUrl; })
    .logoutUser();
}
</script>
