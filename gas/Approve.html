<script>
// ── Read GAS template vars from DOM ──────────────────────────
var _gasEl     = document.getElementById('gasVars');
var APP_USER   = JSON.parse(_gasEl.getAttribute('data-user') || 'null');
var SCRIPT_URL = _gasEl.getAttribute('data-url') || '';

// ── Sidebar ───────────────────────────────────────────────────
(function () {
  if (!APP_USER) return;
  document.getElementById('sidebarName').textContent  = APP_USER.name;
  document.getElementById('sidebarEmail').textContent = APP_USER.email;

  var items = [
    {
      label: '在宅勤務許可申請',
      page:  'reports',
      color: 'text-emerald-400',
      icon:  '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
    },
    {
      label: '日報報告', page: 'task_report', color: 'text-orange-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>',
    },
    {
      label: 'チームカレンダー', page: 'calendar', color: 'text-violet-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/>',
    },
    {
      label: '申請承認', page: 'approve', color: 'text-emerald-400', active: true,
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
    },
  ];
  if (APP_USER.role === 'admin') {
    items.push({
      label: '社員マスタ管理', page: 'employees', color: 'text-pink-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>',
    });
    items.push({
      label: '申請履歴', page: 'admin_history', color: 'text-red-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>',
    });
  }

  var nav = document.getElementById('sidebarNav');
  items.forEach(function (item) {
    var a = document.createElement('a');
    a.href = SCRIPT_URL + '?page=' + item.page;
    a.className = [
      'flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-sm font-medium',
      item.active ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white',
    ].join(' ');
    a.innerHTML =
      '<svg class="w-4 h-4 flex-shrink-0 ' + item.color + '" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
      item.icon + '</svg>' + item.label;
    if (!item.active) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('pageLoader').classList.remove('hidden');
        window.top.location.href = SCRIPT_URL + '?page=' + item.page;
      });
    }
    nav.appendChild(a);
  });
})();

// ── Load logo from Google Drive ──────────────────────────────
var logoFileId = '1aCQV8AlI7ssdAlLCHOOk-HNnZsK1Jr1D'; // Replace with your file ID
google.script.run
  .withSuccessHandler(function (base64Image) {
    if (base64Image) {
      document.getElementById('logoImg').src = base64Image;
    }
  })
  .withFailureHandler(function (error) {
    console.error('Failed to load logo:', error);
  })
  .getImageAsBase64(logoFileId);

// ── State ─────────────────────────────────────────────────────
var allReports     = [];
var selectedReport = null;
var _teleworkLoaded = false;
var _taskLoaded     = false;
var _deptsLoaded    = false;
var _teleworkData   = [];
var _taskData       = [];
var _departments    = [];

// ── Load data in parallel ─────────────────────────────────────
google.script.run
  .withSuccessHandler(function (data) {
    _teleworkData = (data && !data.error) ? data.map(function (r) { r._type = 'telework'; return r; }) : [];
    _teleworkLoaded = true;
    _tryFinishLoad();
  })
  .withFailureHandler(function () { _teleworkLoaded = true; _tryFinishLoad(); })
  .getPendingReports();

google.script.run
  .withSuccessHandler(function (data) {
    _taskData = (data && !data.error) ? data.map(function (r) { r._type = 'task_report'; return r; }) : [];
    _taskLoaded = true;
    _tryFinishLoad();
  })
  .withFailureHandler(function () { _taskLoaded = true; _tryFinishLoad(); })
  .getPendingTaskReports();

google.script.run
  .withSuccessHandler(function (data) {
    _departments = (data && !data.error) ? data : [];
    _deptsLoaded = true;
    _tryFinishLoad();
  })
  .withFailureHandler(function () { _deptsLoaded = true; _tryFinishLoad(); })
  .getApproveDepartments();

function _tryFinishLoad() {
  if (!_teleworkLoaded || !_taskLoaded || !_deptsLoaded) return;
  document.getElementById('listLoading').classList.add('hidden');
  allReports = _teleworkData.concat(_taskData);
  if (!allReports.length) { showListEmpty(); return; }
  populateDeptFilter();
  renderList();
}

function showListEmpty() {
  document.getElementById('listEmpty').classList.remove('hidden');
}

// ── Department filter ─────────────────────────────────────────
function populateDeptFilter() {
  var sel = document.getElementById('deptFilter');
  _departments.forEach(function (d) {
    var o = document.createElement('option');
    o.value = d.name;
    o.textContent = d.name;
    sel.appendChild(o);
  });
  sel.addEventListener('change', renderList);
  document.getElementById('statusFilter').addEventListener('change', renderList);
  document.getElementById('typeFilter').addEventListener('change', renderList);
}

// ── Render list ───────────────────────────────────────────────
function renderList() {
  var dept   = document.getElementById('deptFilter').value;
  var status = document.getElementById('statusFilter').value;
  var type   = document.getElementById('typeFilter').value;
  var filtered = allReports.filter(function (r) {
    if (dept !== 'all' && r.employee_department !== dept) return false;
    if (status !== 'all' && r.status !== status) return false;
    if (type !== 'all' && r._type !== type) return false;
    return true;
  });
  document.getElementById('pendingCount').textContent = filtered.length;
  var list = document.getElementById('requestList');
  list.innerHTML = '';

  if (!filtered.length) { showListEmpty(); return; }
  document.getElementById('listEmpty').classList.add('hidden');

  filtered.forEach(function (r) {
    list.appendChild(makeRequestCard(r));
  });
}

var STATUS_MAP = {
  submitted:         { label: '申請中',   cls: 'bg-orange-100 text-orange-700' },
  reviewer_approved: { label: '確認済',   cls: 'bg-yellow-100 text-yellow-700' },
  approved:          { label: '承認済',   cls: 'bg-green-100 text-green-700' },
  rejected:          { label: '差戻し',     cls: 'bg-red-100 text-red-700' },
  draft:             { label: '下書き',   cls: 'bg-slate-100 text-slate-600' },
  none:              { label: '不明',     cls: 'bg-blue-100 text-blue-700' },
};

function statusBadge(status) {
  var s = STATUS_MAP[status] || STATUS_MAP.none;
  return '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium ' + s.cls + '">' + s.label + '</span>';
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function makeRequestCard(r) {
  var s   = STATUS_MAP[r.status] || STATUS_MAP.none;
  var initials = r.employee_name ? r.employee_name.charAt(0) : '?';
  var card = document.createElement('div');
  var isSelected = selectedReport && selectedReport.id === r.id;
  card.className = [
    'bg-white border rounded-xl p-5 cursor-pointer transition-all hover:shadow-md',
    isSelected ? 'border-blue-400 border-2' : 'border-slate-200',
  ].join(' ');

  var typeLabel = r._type === 'task_report'
    ? '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-orange-50 text-orange-700 mr-1">日報</span>'
    : '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-blue-50 text-blue-700 mr-1">テレワーク</span>';

  if (r._type === 'task_report') {
    // Task report card — single day
    card.innerHTML =
      '<div class="flex items-start gap-4">' +
        '<div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-sm font-bold text-slate-700 flex-shrink-0">' +
          initials +
        '</div>' +
        '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center justify-between gap-2">' +
            '<p class="text-sm font-semibold text-slate-900 truncate">' + escapeHtml(r.employee_name) + '</p>' +
            '<div>' + typeLabel + statusBadge(r.status) + '</div>' +
          '</div>' +
          '<p class="text-xs text-slate-500 mt-0.5">' + escapeHtml(r.employee_department) + '</p>' +
          '<p class="text-xs text-slate-400 mt-1">' + (r.report_date || '') + ' (' + (r.day_short || '') + ')</p>' +
          (r.important_issues
            ? '<p class="text-xs text-slate-600 mt-1 truncate">' + escapeHtml(r.important_issues.substring(0, 40)) + '...</p>'
            : '') +
        '</div>' +
      '</div>';
    card.addEventListener('click', function () {
      selectedReport = r;
      renderList();
      openTaskReportDetail(r);
    });
  } else {
    // Telework request card — weekly grouping
    var tasksHtml = '';
    if (Array.isArray(r.tasks) && r.tasks.length) {
      tasksHtml = '<div class="mt-3 space-y-1">' +
        r.tasks.slice(0, 3).map(function (t) {
          var dayBadge = statusBadge(t.status || r.status);
          var dayLabel = (t.date || '') + ' (' + (t.dayShort || '') + ')';
          var preview = t.notes ? t.notes.substring(0, 25) + '...' : (t.workType || 'テレワーク');
          return '<div class="flex items-center gap-2 text-xs text-slate-600">' +
            dayBadge +
            '<span class="font-medium">' + escapeHtml(dayLabel) + '</span>' +
            '<span class="text-slate-400 truncate">' + escapeHtml(preview) + '</span>' +
          '</div>';
        }).join('') +
        (r.tasks.length > 3 ? '<p class="text-xs text-slate-400 ml-1">+ ' + (r.tasks.length - 3) + ' more days</p>' : '') +
        '</div>';
    }

    card.innerHTML =
      '<div class="flex items-start gap-4">' +
        '<div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-sm font-bold text-slate-700 flex-shrink-0">' +
          initials +
        '</div>' +
        '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center justify-between gap-2">' +
            '<p class="text-sm font-semibold text-slate-900 truncate">' + escapeHtml(r.employee_name) + '</p>' +
            '<div>' + typeLabel + statusBadge(r.status) + '</div>' +
          '</div>' +
          '<p class="text-xs text-slate-500 mt-0.5">' + escapeHtml(r.employee_department) + '</p>' +
          '<p class="text-xs text-slate-400 mt-1">' +
            escapeHtml(r.week_title || '') + ' ' +
            (r.start_date || '') + ' ～ ' + (r.end_date || '') +
          '</p>' +
          tasksHtml +
        '</div>' +
      '</div>';
    card.addEventListener('click', function () {
      selectedReport = r;
      renderList();
      openTeleworkDetail(r);
    });
  }
  return card;
}

// ── Telework detail panel (single day) ───────────────────────
function openTeleworkDetail(r) {
  var sidebar = document.getElementById('detailSidebar');

  // Build individual day cards — each day in r.tasks is one row from telework_reports
  var dayCardsHtml = '';
  if (Array.isArray(r.tasks) && r.tasks.length) {
    // Sort tasks by date ascending
    var sorted = r.tasks.slice().sort(function (a, b) {
      return new Date(a.date).getTime() - new Date(b.date).getTime();
    });
    dayCardsHtml = sorted.map(function (day) {

      // Redmine tasks section for this day
      var redmineHtml = '';
      if (Array.isArray(day.redmineTasks) && day.redmineTasks.length) {
        redmineHtml =
          '<div class="mt-3">' +
            '<p class="text-xs font-medium text-slate-500 mb-2">Redmine作業実績</p>' +
            '<div class="space-y-1.5">' +
            day.redmineTasks.map(function (t) {
              return '<div class="bg-white rounded-lg p-2.5 border border-slate-200 text-xs">' +
                '<div class="font-medium text-slate-900 truncate">#' + escapeHtml(String(t.id || '')) + ' ' + escapeHtml(t.subject || '') + '</div>' +
                '<div class="flex flex-wrap gap-2 mt-1 text-slate-500">' +
                  (t.project ? '<span class="truncate max-w-[120px]">' + escapeHtml(t.project) + '</span>' : '') +
                  '<span class="font-medium text-blue-700">⏱ ' + (t.hours || 0) + 'h</span>' +
                  '<span class="font-medium text-emerald-700">進捗: ' + (t.progress || 0) + '%</span>' +
                '</div>' +
              '</div>';
            }).join('') +
            '</div>' +
          '</div>';
      }

      return '<div class="bg-slate-50 rounded-xl p-4 border border-slate-200">' +
        // Day header
        '<div class="flex items-center justify-between mb-3">' +
          '<div>' +
            '<p class="text-sm font-semibold text-slate-900">' +
              escapeHtml(day.date || '') + ' (' + escapeHtml(day.dayShort || '') + ')' +
            '</p>' +
            '<p class="text-xs text-slate-500 mt-0.5">' + escapeHtml(day.workType || 'テレワーク') + '</p>' +
          '</div>' +
          statusBadge(day.status) +
        '</div>' +
        // Business notes
        (day.notes
          ? '<div class="mb-3">' +
              '<p class="text-xs font-medium text-slate-500 mb-1">業務内容</p>' +
              '<p class="text-sm text-slate-800 whitespace-pre-wrap leading-relaxed">' + escapeHtml(day.notes) + '</p>' +
            '</div>'
          : '') +
        redmineHtml +
      '</div>';
    }).join('');
  } else {
    dayCardsHtml = '<p class="text-sm text-slate-400">申請日がありません</p>';
  }

  sidebar.innerHTML =
    '<div class="p-8 border-b border-slate-100">' +
      '<h2 class="text-lg font-semibold text-slate-900">テレワーク申請詳細</h2>' +
      '<div class="flex items-center gap-2 mt-2">' +
        '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-blue-50 text-blue-700">テレワーク</span>' +
        statusBadge(r.status) +
      '</div>' +
      '<p class="text-xs text-slate-400 mt-1">' +
        escapeHtml(r.week_title || '') + '　' + (r.start_date || '') + ' 〜 ' + (r.end_date || '') +
      '</p>' +
    '</div>' +
    '<div class="flex-1 p-8 overflow-y-auto">' +
      '<div class="mb-5">' +
        '<p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">申請者</p>' +
        '<p class="text-sm font-semibold text-slate-900">' + escapeHtml(r.employee_name) + '</p>' +
        '<p class="text-xs text-slate-500">' + escapeHtml(r.employee_department) + '</p>' +
      '</div>' +
      '<p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-3">' +
        '申請日一覧 (' + (r.tasks ? r.tasks.length : 0) + '日)' +
      '</p>' +
      '<div class="space-y-4 mb-6">' + dayCardsHtml + '</div>' +
      // Single comment and approve/reject for entire request
      '<div class="border-t border-slate-200 pt-5 mt-5">' +
        '<label class="text-xs font-medium text-slate-700 block mb-2">承認者コメント</label>' +
        '<textarea id="approverComment" rows="3" placeholder="コメントを入力（任意）" ' +
          'class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm resize-none ' +
          'focus:outline-none focus:ring-2 focus:ring-blue-300 mb-3"></textarea>' +
        '<div class="flex gap-3">' +
          '<button onclick="doReject(\'' + r.id + '\')" ' +
            'class="flex-1 h-10 border border-red-300 text-red-600 rounded-lg text-sm font-medium hover:bg-red-50 transition-colors">' +
            '差戻し' +
          '</button>' +
          '<button onclick="doApprove(\'' + r.id + '\')" ' +
            'class="flex-1 h-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-full text-sm font-medium transition-colors">' +
            '承認 ✓' +
          '</button>' +
        '</div>' +
        '<div id="actionMsg" class="hidden text-sm text-center p-2 rounded-md mt-3"></div>' +
      '</div>' +
    '</div>';
}

// ── Task Report detail panel ──────────────────────────────────
function openTaskReportDetail(r) {
  var sidebar = document.getElementById('detailSidebar');

  // Redmine tasks
  var redmineHtml = '';
  if (Array.isArray(r.redmineTasks) && r.redmineTasks.length) {
    redmineHtml = '<div>' +
      '<p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-2">Redmine作業実績</p>' +
      '<div class="space-y-2">' +
      r.redmineTasks.map(function (t) {
        return '<div class="bg-slate-50 rounded-lg p-3 border border-slate-100 text-xs">' +
          '<div class="font-medium text-slate-900">#' + escapeHtml(String(t.id || '')) + ' ' + escapeHtml(t.subject || '') + '</div>' +
          '<div class="flex gap-3 mt-1 text-slate-500">' +
            (t.project ? '<span>' + escapeHtml(t.project) + '</span>' : '') +
            '<span class="font-medium text-blue-700">⏱ ' + (t.hours || 0) + 'h</span>' +
            '<span class="font-medium text-emerald-700">進捗: ' + (t.progress || 0) + '%</span>' +
          '</div>' +
        '</div>';
      }).join('') +
      '</div></div>';
  }

  // Approval summary
  var approvalHtml = '';
  if (Array.isArray(r.approvals) && r.approvals.length) {
    approvalHtml = '<div>' +
      '<p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-2">承認状況</p>' +
      '<div class="space-y-2">' +
      r.approvals.map(function (a) {
        var levelLabel = String(a.level) === '1' ? 'レビュアー' : 'マネージャー';
        var decBadge = a.decision === 'approved' ? statusBadge('approved') :
                       a.decision === 'rejected' ? statusBadge('rejected') :
                       '<span class="text-xs text-slate-400">未確認</span>';
        return '<div class="flex items-center justify-between bg-slate-50 rounded p-2">' +
          '<span class="text-xs text-slate-600">' + levelLabel + '</span>' +
          decBadge +
        '</div>';
      }).join('') +
      '</div></div>';
  }

  sidebar.innerHTML =
    '<div class="p-8 border-b border-slate-100">' +
      '<h2 class="text-lg font-semibold text-slate-900">日報詳細</h2>' +
      '<div class="flex items-center gap-2 mt-2">' +
        '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-orange-50 text-orange-700">日報</span>' +
        statusBadge(r.status) +
      '</div>' +
      '<p class="text-xs text-slate-400 mt-1">' + (r.report_date || '') + ' (' + (r.day_short || '') + ')</p>' +
    '</div>' +
    '<div class="flex-1 p-8 space-y-5 overflow-y-auto">' +
      '<div>' +
        '<p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">報告者</p>' +
        '<p class="text-sm font-semibold text-slate-900">' + escapeHtml(r.employee_name) + '</p>' +
        '<p class="text-xs text-slate-500">' + escapeHtml(r.employee_department) + '</p>' +
      '</div>' +
      '<div>' +
        '<p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">重要課題</p>' +
        '<div class="bg-slate-50 rounded-lg p-3 border border-slate-100">' +
          '<p class="text-sm text-slate-800 whitespace-pre-wrap">' + escapeHtml(r.important_issues || '記載なし') + '</p>' +
        '</div>' +
      '</div>' +
      '<div>' +
        '<p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">翌営業日の作業予定</p>' +
        '<div class="bg-slate-50 rounded-lg p-3 border border-slate-100">' +
          '<p class="text-sm text-slate-800 whitespace-pre-wrap">' + escapeHtml(r.next_day_plan || '記載なし') + '</p>' +
        '</div>' +
      '</div>' +
      redmineHtml +
      approvalHtml +
      '<div>' +
        '<label class="text-xs font-medium text-slate-700 block mb-1">承認者コメント</label>' +
        '<textarea id="approverComment" rows="3" placeholder="コメントを入力（任意）" ' +
          'class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm resize-none ' +
          'focus:outline-none focus:ring-2 focus:ring-blue-300"></textarea>' +
      '</div>' +
      '<div class="flex gap-2">' +
        '<button onclick="doReject(\'' + r.id + '\')" ' +
          'class="flex-1 h-10 border border-red-300 text-red-600 rounded-lg text-sm font-medium hover:bg-red-50 transition-colors">' +
          '差戻し' +
        '</button>' +
        '<button onclick="doApprove(\'' + r.id + '\')" ' +
          'class="flex-1 h-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-full text-sm font-medium transition-colors">' +
          '承認 ✓' +
        '</button>' +
      '</div>' +
      '<div id="actionMsg" class="hidden text-sm text-center p-2 rounded-md"></div>' +
    '</div>';
}

function doApprove(reportId) {
  var comment = (document.getElementById('approverComment') || {}).value || '';
  var isTaskReport = selectedReport && selectedReport._type === 'task_report';
  
  if (isTaskReport) {
    // Task report - single day approval
    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.error) { showActionMsg(r.error, false); return; }
        showActionMsg('承認しました！', true);
        reloadReports();
      })
      .withFailureHandler(function () { showActionMsg('エラーが発生しました', false); })
      .approveTaskReportAction(reportId, comment);
  } else {
    // Telework - approve all days in the week
    if (!selectedReport || !selectedReport.tasks || !selectedReport.tasks.length) {
      showActionMsg('申請日が見つかりません', false);
      return;
    }
    
    showActionMsg('承認処理中...', true);
    var dayIds = selectedReport.tasks.map(function(t) { return t.id; });
    approveAllDays(dayIds, comment, 0);
  }
}

function approveAllDays(dayIds, comment, index) {
  if (index >= dayIds.length) {
    showActionMsg('すべての日を承認しました！', true);
    setTimeout(function() { reloadReports(); }, 1000);
    return;
  }
  
  google.script.run
    .withSuccessHandler(function (r) {
      if (r && r.error) {
        showActionMsg('エラー: ' + r.error, false);
        return;
      }
      // Approve next day
      approveAllDays(dayIds, comment, index + 1);
    })
    .withFailureHandler(function () {
      showActionMsg('エラーが発生しました', false);
    })
    .approveReportAction(dayIds[index], comment);
}

function doReject(reportId) {
  var comment = (document.getElementById('approverComment') || {}).value || '';
  var isTaskReport = selectedReport && selectedReport._type === 'task_report';
  
  if (isTaskReport) {
    // Task report - single day rejection
    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.error) { showActionMsg(r.error, false); return; }
        showActionMsg('差戻ししました', true);
        reloadReports();
      })
      .withFailureHandler(function () { showActionMsg('エラーが発生しました', false); })
      .rejectTaskReportAction(reportId, comment);
  } else {
    // Telework - reject all days in the week
    if (!selectedReport || !selectedReport.tasks || !selectedReport.tasks.length) {
      showActionMsg('申請日が見つかりません', false);
      return;
    }
    
    showActionMsg('差戻し処理中...', true);
    var dayIds = selectedReport.tasks.map(function(t) { return t.id; });
    rejectAllDays(dayIds, comment, 0);
  }
}

function rejectAllDays(dayIds, comment, index) {
  if (index >= dayIds.length) {
    showActionMsg('すべての日を差戻ししました', true);
    setTimeout(function() { reloadReports(); }, 1000);
    return;
  }
  
  google.script.run
    .withSuccessHandler(function (r) {
      if (r && r.error) {
        showActionMsg('エラー: ' + r.error, false);
        return;
      }
      // Reject next day
      rejectAllDays(dayIds, comment, index + 1);
    })
    .withFailureHandler(function () {
      showActionMsg('エラーが発生しました', false);
    })
    .rejectReportAction(dayIds[index], comment);
}

function showActionMsg(msg, ok) {
  var el = document.getElementById('actionMsg');
  if (!el) return;
  el.textContent = msg;
  el.className   = 'text-sm text-center p-2 rounded-md ' +
    (ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700');
  el.classList.remove('hidden');
}

function reloadReports() {
  allReports     = [];
  selectedReport = null;
  _teleworkLoaded = false;
  _taskLoaded     = false;
  _teleworkData   = [];
  _taskData       = [];
  document.getElementById('requestList').innerHTML = '';
  document.getElementById('listLoading').classList.remove('hidden');
  document.getElementById('listEmpty').classList.add('hidden');

  google.script.run
    .withSuccessHandler(function (data) {
      _teleworkData = (data && !data.error) ? data.map(function (r) { r._type = 'telework'; return r; }) : [];
      _teleworkLoaded = true;
      _tryReloadFinish();
    })
    .withFailureHandler(function () { _teleworkLoaded = true; _tryReloadFinish(); })
    .getPendingReports();

  google.script.run
    .withSuccessHandler(function (data) {
      _taskData = (data && !data.error) ? data.map(function (r) { r._type = 'task_report'; return r; }) : [];
      _taskLoaded = true;
      _tryReloadFinish();
    })
    .withFailureHandler(function () { _taskLoaded = true; _tryReloadFinish(); })
    .getPendingTaskReports();
}

function _tryReloadFinish() {
  if (!_teleworkLoaded || !_taskLoaded) return;
  document.getElementById('listLoading').classList.add('hidden');
  allReports = _teleworkData.concat(_taskData);
  if (!allReports.length) { showListEmpty(); return; }
  renderList();
  document.getElementById('detailSidebar').innerHTML =
    '<div class="p-6 border-b border-slate-100">' +
      '<h2 class="text-lg font-semibold text-slate-900">申請詳細</h2>' +
      '<p class="text-xs text-slate-500 mt-1">リクエストを選択してください</p>' +
    '</div>' +
    '<div class="flex-1 p-6">' +
      '<p class="text-sm text-slate-400">左のリストからリクエストを選択してください。</p>' +
    '</div>';
}

// ── Logout ────────────────────────────────────────────────────
function logout() {
  document.getElementById('pageLoader').classList.remove('hidden');
  google.script.run
    .withSuccessHandler(function (r) { window.top.location.href = r.redirectUrl; })
    .logoutUser();
}
</script>
</body>
</html>
