<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在宅勤務報告システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Noto Sans JP', sans-serif;
    }
    
    body {
      font-size: 16px;
      line-height: 1.8;  
      background-size: cover;
      background-image: url('https://drive.google.com/thumbnail?id=1ENXhRacOCtA342OB_Lg9NyeCzr6aGndG&sz=w2000');

    }
  </style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg overflow-hidden">

    <!-- Header -->
    <div class="text-center pt-10 px-8 pb-6">
      <div class="flex justify-center mb-4">
        <img id="logoImg" src="https://drive.google.com/thumbnail?id=1aCQV8AlI7ssdAlLCHOOk-HNnZsK1Jr1D&sz=w300" alt="Logo" class="h-14 w-14 rounded-xl object-cover shadow-sm" />
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900">Mamiya ITS</h1>
      <p class="text-xs text-slate-500 mt-1">社内報告システム</p>
    </div>

    <!-- Main content -->
    <div class="px-8 pb-8 space-y-4">

      <!-- Feedback messages -->
      <div id="errorMsg" class="hidden text-sm text-red-600 text-center bg-red-50 p-3 rounded-xl border border-red-100"></div>
      <div id="infoMsg"  class="hidden text-sm text-blue-700 text-center bg-blue-50 p-3 rounded-xl border border-blue-100"></div>

      <!-- ① Google Workspace button — primary CTA -->
      <button type="button" id="googleBtn" onclick="tryGoogleAuth()"
        class="w-full h-12 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl
               transition-colors flex items-center justify-center gap-3 text-sm shadow-sm">
        <span class="rounded flex items-center justify-center">
           <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </span>
        Google Workspaceでサインイン
      </button>

      <!-- ② Toggle — show password login -->
      <div class="text-center">
        <button type="button" id="togglePasswordLogin"
          class="text-xs text-slate-500 hover:text-slate-700 border border-slate-300 hover:border-slate-400
                 rounded-full px-4 py-1.5 transition-colors"
          onclick="togglePasswordSection()">
          ユーザー名でログイン
        </button>
      </div>

      <!-- ③ Password login — hidden by default -->
      <div id="passwordLoginSection" class="hidden">
        <div class="border-t border-slate-100 pt-4">
          <form id="loginForm" class="space-y-3">
            <div>
              <label for="email" class="text-xs font-medium text-slate-700 block mb-1">ユーザー名</label>
              <input id="email" type="email" placeholder="user@telework.pro" required
                class="h-10 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                       focus:outline-none focus:ring-2 focus:ring-slate-400" />
            </div>
            <div>
              <label for="password" class="text-xs font-medium text-slate-700 block mb-1">パスワード</label>
              <input id="password" type="password" placeholder="パスワードを入力"
                class="h-10 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm
                       focus:outline-none focus:ring-2 focus:ring-slate-400" />
              <p id="passwordHint" class="text-xs text-slate-400 mt-1">
                Google Workspaceアカウントをお持ちでない方は、登録済みのメールアドレスとパスワードでログインしてください。
              </p>
            </div>
            <button type="submit" id="submitBtn"
              class="w-full h-11 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-xl transition-colors text-sm">
              サインイン →
            </button>
          </form>
        </div>
      </div>

      <!-- Footer -->
      <div class="pt-2 text-center">
        <p class="text-xs text-slate-400">© 2026 Mamiya IT Solutions. All rights reserved.</p>
      </div>
    </div>
  </div>

  <script>
    var form       = document.getElementById('loginForm');
    var errorMsg   = document.getElementById('errorMsg');
    var infoMsg    = document.getElementById('infoMsg');
    var submitBtn  = document.getElementById('submitBtn');
    var googleBtn  = document.getElementById('googleBtn');
    var emailInput = document.getElementById('email');
    var passInput  = document.getElementById('password');
    var passHint   = document.getElementById('passwordHint');

    // ページ読み込み時に一度取得した Google Workspace セッションのメールアドレス
    var gwsSessionEmail = '';
    
    // サーバーサイドテンプレートから渡されるリダイレクト先ページ（当初リクエストしたページ）
    var redirectPage = '<?!= redirectPage ?>' || '';

    // ── Toggle password login section ─────────────────────────────
    function togglePasswordSection() {
      var section = document.getElementById('passwordLoginSection');
      var btn     = document.getElementById('togglePasswordLogin');
      var hidden  = section.classList.contains('hidden');
      section.classList.toggle('hidden', !hidden);
      btn.textContent = hidden ? '閉じる' : 'ユーザー名でログイン';
      if (hidden) {
        setTimeout(function () { emailInput && emailInput.focus(); }, 50);
      }
    }

    // ── Email blur: detect GWS session match → update password hint ──
    if (emailInput) {
      emailInput.addEventListener('blur', function () {
        var typed = emailInput.value.trim().toLowerCase();
        if (!typed) return;
        if (gwsSessionEmail && gwsSessionEmail.toLowerCase() === typed) {
          passInput.removeAttribute('required');
          passInput.placeholder = '不要（Google Workspaceセッション有効）';
          passHint.textContent  = '✅ Google Workspaceセッションが確認できました。パスワードは不要です。';
          passHint.className    = 'text-xs text-green-600 font-medium mt-1';
        } else {
          passInput.setAttribute('required', '');
          passInput.placeholder = 'パスワードを入力';
          passHint.textContent  = 'Google Workspaceアカウントをお持ちでない方は、登録済みのメールアドレスとパスワードでログインしてください';
          passHint.className    = 'text-xs text-slate-400 mt-1';
        }
      });
    }

    // ── UI helpers ────────────────────────────────────────────────
    function setLoading(on) {
      if (submitBtn) {
        submitBtn.disabled    = on;
        submitBtn.textContent = on ? 'サインイン中...' : 'サインイン →';
        submitBtn.style.opacity = on ? '0.6' : '1';
      }
      googleBtn.disabled    = on;
      googleBtn.style.opacity = on ? '0.6' : '1';
    }
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
      infoMsg.classList.add('hidden');
    }
    function showInfo(msg) {
      infoMsg.textContent = msg;
      infoMsg.classList.remove('hidden');
      errorMsg.classList.add('hidden');
    }
    function clearMessages() {
      errorMsg.classList.add('hidden');
      infoMsg.classList.add('hidden');
    }
    function handleResult(result) {
      if (result && result.error) { showError(result.error); return; }
      if (result && result.redirectUrl) {
        showInfo('ログイン成功。リダイレクト中...');
        window.location.replace(result.redirectUrl);
      }
    }

    // ── Email + password form submit ──────────────────────────────
    if (form) {
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearMessages();
        var email    = emailInput.value.trim();
        var password = passInput.value;
        if (!email) { showError('メールアドレスを入力してください。'); return; }
        setLoading(true);
        google.script.run
          .withSuccessHandler(function (result) { setLoading(false); handleResult(result); })
          .withFailureHandler(function ()        { setLoading(false); showError('サーバーエラーが発生しました。もう一度お試しください。'); })
          .loginUser(email, password, redirectPage);
      });
    }

    // ── Google Workspace button ───────────────────────────────────
    function tryGoogleAuth() {
      clearMessages();
      showInfo('Google Workspaceセッションを確認中...');
      setLoading(true);
      google.script.run
        .withSuccessHandler(function (result) { setLoading(false); handleResult(result); })
        .withFailureHandler(function ()        { setLoading(false); showError('Google認証に失敗しました。管理者にお問い合わせください。'); })
        .loginWithGoogle(redirectPage);
    }
  </script>
</body>
</html>
