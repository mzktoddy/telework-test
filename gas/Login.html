  <script>
    var form       = document.getElementById('loginForm');
    var errorMsg   = document.getElementById('errorMsg');
    var infoMsg    = document.getElementById('infoMsg');
    var submitBtn  = document.getElementById('submitBtn');
    var googleBtn  = document.getElementById('googleBtn');
    var emailInput = document.getElementById('email');
    var passInput  = document.getElementById('password');
    var passHint   = document.getElementById('passwordHint');

    // Active Google Workspace session email ‚ÄĒ fetched once on page load
    var gwsSessionEmail = '';

    // ‚ĒÄ‚ĒÄ On page load: get GWS session email + try silent auto-login ‚ĒÄ‚ĒÄ
    window.addEventListener('load', function () {
    //   showInfo('Google Workspace„āĽ„ÉÉ„ā∑„Éß„É≥„āíÁĘļŤ™ćšł≠...');

      // Load logo image from Google Drive as base64
      var logoFileId = '1aCQV8AlI7ssdAlLCHOOk-HNnZsK1Jr1D'; // Replace with your file ID
      google.script.run
        .withSuccessHandler(function (base64Image) {
          if (base64Image) {
            document.getElementById('logoImg').src = base64Image;
          }
        })
        .withFailureHandler(function (error) {

        })
        .getImageAsBase64(logoFileId);

    //   // Step 1: get the GWS session email for client-side hint logic
    //   google.script.run
    //     .withSuccessHandler(function (email) {
    //       gwsSessionEmail = email || '';

    //       if (gwsSessionEmail) {
    //         // Step 2: active session found ‚ÄĒ try silent login
    //         google.script.run
    //           .withSuccessHandler(function (result) {
    //             clearMessages();
    //             if (result && result.success && result.redirectUrl) {
    //               showInfo('„É≠„āį„ā§„É≥śłą„ĀŅ„Āß„Āô„Äā„É™„ÉÄ„ā§„É¨„āĮ„Éąšł≠...');
    //               window.location.replace(result.redirectUrl);
    //             }
    //             // error = email not in system; stay on page
    //           })
    //           .withFailureHandler(function () { clearMessages(); })
    //           .loginWithGoogle();
    //       } else {
    //         clearMessages(); // No GWS session at all ‚ÄĒ show form normally
    //       }
    //     })
    //     .withFailureHandler(function () { clearMessages(); })
    //     .getGwsSessionEmail();
    });

    // ‚ĒÄ‚ĒÄ Email blur: detect GWS session match ‚Üí update password hint ‚ĒÄ‚ĒÄ
    //  PASSWORD is accepted from ONE of two sources:
    //    1. The plain-text password whose SHA-256 hash is stored in the
    //       `password_hash` column of the users Google Sheet.
    //    2. Nothing ‚ÄĒ when the browser's active Google Workspace session
    //       email matches the typed email (GWS identity = proof).
    emailInput.addEventListener('blur', function () {
      var typed = emailInput.value.trim().toLowerCase();
      if (!typed) return;

      if (gwsSessionEmail && gwsSessionEmail.toLowerCase() === typed) {
        // GWS session matches ‚ÄĒ password not required
        passInput.removeAttribute('required');
        passInput.placeholder = 'šłćŤ¶ĀÔľąGoogle Workspace„āĽ„ÉÉ„ā∑„Éß„É≥śúČŚäĻÔľČ';
        passHint.textContent  = '‚úÖ Google Workspace„āĽ„ÉÉ„ā∑„Éß„É≥„ĀĆÁĘļŤ™ć„Āß„Āć„Āĺ„Āó„Āü„Äā„ÉĎ„āĻ„ÉĮ„Éľ„ÉČ„ĀĮšłćŤ¶Ā„Āß„Āô„Äā';
        passHint.className    = 'text-xs text-green-600 font-medium mt-1';
      } else {
        // No GWS match ‚ÄĒ need the password from the Google Sheet
        passInput.setAttribute('required', '');
        passInput.placeholder = '„ÉĎ„āĻ„ÉĮ„Éľ„ÉČ„āíŚÖ•Śäõ';
        passHint.textContent  = 'Google Sheets„Āģpassword_hashŚąó„ĀęŚĮĺŚŅú„Āô„āč„ÉĎ„āĻ„ÉĮ„Éľ„ÉČ„āíŚÖ•Śäõ„Āó„Ā¶„ĀŹ„Ā†„Āē„ĀĄ„Äā';
        passHint.className    = 'text-xs text-gray-400 mt-1';
      }
    });

    // ‚ĒÄ‚ĒÄ UI helpers ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
    function setLoading(on) {
      submitBtn.disabled    = on;
      googleBtn.disabled    = on;
      submitBtn.textContent = on ? '„āĶ„ā§„É≥„ā§„É≥šł≠...' : '„āĶ„ā§„É≥„ā§„É≥ ‚Üí';
      submitBtn.style.opacity = on ? '0.6' : '1';
      googleBtn.style.opacity = on ? '0.6' : '1';
    }
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
      infoMsg.classList.add('hidden');
    }
    function showInfo(msg) {
      infoMsg.textContent = msg;
      infoMsg.classList.remove('hidden');
      errorMsg.classList.add('hidden');
    }
    function clearMessages() {
      errorMsg.classList.add('hidden');
      infoMsg.classList.add('hidden');
    }
    function handleResult(result) {
      if (result && result.error) { showError(result.error); return; }
      if (result && result.redirectUrl) {
        showInfo('„É≠„āį„ā§„É≥śąźŚäü„Äā„É™„ÉÄ„ā§„É¨„āĮ„Éąšł≠...');
        // window.location.replace is reliable in GAS‚Äôs sandboxed environment.
        // It replaces the current history entry so Back does not return to Login.
        window.location.replace(result.redirectUrl);
      }
    }

    // ‚ĒÄ‚ĒÄ Email + password form submit ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      clearMessages();
      var email    = emailInput.value.trim();
      var password = passInput.value;
      if (!email) { showError('„É°„Éľ„Éę„āĘ„ÉČ„É¨„āĻ„āíŚÖ•Śäõ„Āó„Ā¶„ĀŹ„Ā†„Āē„ĀĄ„Äā'); return; }
      setLoading(true);
      google.script.run
        .withSuccessHandler(function (result) { setLoading(false); handleResult(result); })
        .withFailureHandler(function ()        { setLoading(false); showError('„āĶ„Éľ„Éź„Éľ„ā®„É©„Éľ„ĀĆÁôļÁĒü„Āó„Āĺ„Āó„Āü„Äā„āā„ĀÜšłÄŚļ¶„ĀäŤ©¶„Āó„ĀŹ„Ā†„Āē„ĀĄ„Äā'); })
        .loginUser(email, password);
    });

    // ‚ĒÄ‚ĒÄ Google Workspace button ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
    //  Reads Session.getActiveUser().getEmail() on the server.
    //  No credentials entered ‚ÄĒ Google identity is the proof.
    function tryGoogleAuth() {
      clearMessages();
      showInfo('Google Workspace„āĽ„ÉÉ„ā∑„Éß„É≥„āíÁĘļŤ™ćšł≠...');
      setLoading(true);
      google.script.run
        .withSuccessHandler(function (result) { setLoading(false); handleResult(result); })
        .withFailureHandler(function ()        { setLoading(false); showError('GoogleŤ™ćŤ®ľ„ĀęŚ§Īśēó„Āó„Āĺ„Āó„Āü„ÄāÁģ°ÁźÜŤÄÖ„Āę„ĀäŚēŹ„ĀĄŚźą„āŹ„Āõ„ĀŹ„Ā†„Āē„ĀĄ„Äā'); })
        .loginWithGoogle();
    }
  </script>
