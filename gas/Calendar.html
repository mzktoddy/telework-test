// ── Logout ─────────────────────────────────────────────────────
function logout() {

    .withFailureHandler(function () { window.top.location.href = SCRIPT_URL + '?page=login'; })

// ── State ─────────────────────────────────────────────────────
var _allData    = [];
var _filtered   = [];
var _year       = new Date().getFullYear();
var _month      = new Date().getMonth(); // 0-indexed
var _dataReady  = false;
var _deptsReady = false;

// ── Data loading ──────────────────────────────────────────────
google.script.run
  .withSuccessHandler(function (data) {
    _allData   = Array.isArray(data) ? data : [];
    _dataReady = true;
    _checkReady();
  })
  .withFailureHandler(function () {
    _dataReady = true;
    _checkReady();
    showToast('データの読み込みに失敗しました', true);
  })
  .getTeamCalendarData();

google.script.run
  .withSuccessHandler(function (depts) {
    if (Array.isArray(depts)) {
      var sel = document.getElementById('deptFilter');
      depts.forEach(function (d) {
        var opt = document.createElement('option');
        opt.value       = d.id;
        opt.textContent = d.name;
        sel.appendChild(opt);
      });
    }
    _deptsReady = true;
    _checkReady();
  })
  .withFailureHandler(function () {
    _deptsReady = true;
    _checkReady();
  })
  .getTeamCalendarDepartments();

function _checkReady() {
  if (!_dataReady || !_deptsReady) return;
  document.getElementById('calLoading').classList.add('hidden');
  document.getElementById('calWrap').classList.remove('hidden');
  // Hide dept filter for non-admin users (server already filters their data)
  if (APP_USER && APP_USER.role !== 'admin') {
    var dfWrap = document.getElementById('deptFilter');
    if (dfWrap) dfWrap.style.display = 'none';
  }
  applyFilter();
}

// ── Navigation ────────────────────────────────────────────────
function _syncNavInputs() {
  document.getElementById('navYear').value  = _year;
  document.getElementById('navMonth').value = _month + 1;
}

function _onNavInput() {
  var y = parseInt(document.getElementById('navYear').value,  10);
  var m = parseInt(document.getElementById('navMonth').value, 10);
  if (isNaN(y) || isNaN(m)) return;
  // Clamp month 1-12
  if (m < 1)  { m = 1;  document.getElementById('navMonth').value = 1; }
  if (m > 12) { m = 12; document.getElementById('navMonth').value = 12; }
  if (y < 2000 || y > 2099) return;
  _year  = y;
  _month = m - 1;
  renderCalendar();
}

function prevMonth() {
  _month--;
  if (_month < 0) { _month = 11; _year--; }
  renderCalendar();
}
function nextMonth() {
  _month++;
  if (_month > 11) { _month = 0; _year++; }
  renderCalendar();
}
function goToday() {
  var t  = new Date();
  _year  = t.getFullYear();
  _month = t.getMonth();
  renderCalendar();
}

// ── Dept filter ───────────────────────────────────────────────
function applyFilter() {
  var deptId = document.getElementById('deptFilter').value;
  _filtered  = deptId
    ? _allData.filter(function (r) { return r.department_id === deptId; })
    : _allData.slice();
  renderCalendar();
}

// ── Entries for a specific date ───────────────────────────────
function _getEntries(dateStr) {
  return _filtered.filter(function (r) { return r.request_date === dateStr; });
}

// ── Render calendar grid ──────────────────────────────────────
function renderCalendar() {
  closeDayPopup();
  _syncNavInputs();

  var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  var today    = new Date();
  var todayStr = today.getFullYear() + '-' +
    String(today.getMonth() + 1).padStart(2, '0') + '-' +
    String(today.getDate()).padStart(2, '0');

  // Offset: JS getDay() Sunday=0, Mon=1; we want Mon-first grid (Mon=0, Sun=6)
  var jsFirstDay = new Date(_year, _month, 1).getDay();
  var offset     = (jsFirstDay === 0) ? 6 : jsFirstDay - 1;
  var daysInMonth = new Date(_year, _month + 1, 0).getDate();

  // 5 or 6 complete rows
  var totalCells = Math.ceil((offset + daysInMonth) / 7) * 7;
  if (totalCells < 35) totalCells = 35;

  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  for (var i = 0; i < totalCells; i++) {
    var dayNum = i - offset + 1;
    var colIdx = i % 7; // 0=Mon … 5=Sat … 6=Sun
    var isValid = (dayNum >= 1 && dayNum <= daysInMonth);

    var cell = document.createElement('div');
    cell.className = [
      'p-2 border-b border-slate-100',
      colIdx < 6 ? 'border-r border-slate-100' : '',
      colIdx === 5 ? 'bg-sky-50/40'  : '',
      colIdx === 6 ? 'bg-rose-50/40' : '',
      !isValid     ? 'bg-slate-50/50' : '',
    ].filter(Boolean).join(' ');

    if (isValid) {
      var dateStr = _year + '-' +
        String(_month + 1).padStart(2, '0') + '-' +
        String(dayNum).padStart(2, '0');

      var isToday  = (dateStr === todayStr);
      var entries  = _getEntries(dateStr);

      // Day number
      var numCls = [
        'inline-flex items-center justify-center w-7 h-7 rounded-full text-sm font-medium mb-1',
        isToday   ? 'bg-blue-600 text-white font-bold'
          : colIdx === 6 ? 'text-rose-500 font-semibold'
          : colIdx === 5 ? 'text-blue-500 font-semibold'
          : 'text-slate-700',
      ].join(' ');

      var contentHtml = '';

      if (entries.length > 0 && entries.length <= 5) {
        // Show each employee pill — clicking the block opens popup for dept detail
        contentHtml =
          '<div onclick="showDayPopup(\'' + _escJs(dateStr) + '\',event)" class="cursor-pointer space-y-0.5">' +
          entries.map(function (e) {
            return '<div class="flex items-center gap-1 px-1.5 py-0.5 bg-slate-800 rounded text-white">' +
              '<span class="flex-1 min-w-0 text-xs font-medium truncate leading-tight">' +
                escHtml(e.employee_name) +
              '</span>' +
              _statusChip(e.status) +
            '</div>';
          }).join('') +
          '</div>';

      } else if (entries.length > 5) {
        // Show count button only
        contentHtml =
          '<button onclick="showDayPopup(\'' + _escJs(dateStr) + '\',event)" ' +
          'class="mt-0.5 w-full flex items-center gap-1.5 px-2 py-1.5 bg-slate-800 ' +
          'hover:bg-slate-700 text-white text-xs font-medium rounded-lg transition-colors">' +
          '<svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
          '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" ' +
          'd="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857' +
          'M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857' +
          'm0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>' +
          '</svg>' +
          entries.length + '名 在宅勤務' +
          '</button>';
      }

      cell.innerHTML = '<div class="' + numCls + '">' + dayNum + '</div>' + contentHtml;
    }

    grid.appendChild(cell);
  }
}

// ── Status chip (dark background, used in cell pills) ─────────
function _statusChip(status) {
  var MAP = {
    approved:          ['承認', 'bg-green-500/25 text-green-300'],
    submitted:         ['申請中', 'bg-orange-500/25 text-orange-300'],
    reviewer_approved: ['審査済', 'bg-blue-500/25 text-blue-300'],
    rejected:          ['差戻し',  'bg-red-500/25 text-red-300'],
  };
  var info = MAP[status] || ['‐', 'bg-slate-500/25 text-slate-400'];
  return '<span class="flex-shrink-0 text-[10px] px-1 py-0.5 rounded whitespace-nowrap ' +
    info[1] + '">' + info[0] + '</span>';
}

// ── Status badge (light background, used in popup) ────────────
function _statusBadge(status) {
  var MAP = {
    approved:          ['承認済み', 'bg-green-100 text-green-700'],
    submitted:         ['申請中',   'bg-orange-100 text-orange-700'],
    reviewer_approved: ['審査承認', 'bg-blue-100 text-blue-700'],
    rejected:          ['差戻し',     'bg-red-100 text-red-700'],
  };
  var info = MAP[status] || [status || '‐', 'bg-slate-100 text-slate-500'];
  return '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' +
    info[1] + '">' + info[0] + '</span>';
}

// ── Day popup ─────────────────────────────────────────────────
function showDayPopup(dateStr, event) {
  var entries = _getEntries(dateStr);
  if (!entries.length) return;

  document.getElementById('popupDate').textContent  = dateStr;
  document.getElementById('popupCount').textContent = entries.length + '名';

  document.getElementById('popupList').innerHTML = entries.map(function (e) {
    return '<div class="flex items-center gap-2 px-3 py-2.5 border-b border-slate-50 ' +
      'last:border-0 hover:bg-slate-50 transition-colors">' +
      '<div class="flex-1 min-w-0">' +
        '<p class="text-sm font-medium text-slate-900 truncate">' + escHtml(e.employee_name) + '</p>' +
        '<p class="text-xs text-slate-400 truncate">' + escHtml(e.department) + '</p>' +
      '</div>' +
      _statusBadge(e.status) +
    '</div>';
  }).join('');

  // Smart position: favour right/below click, flip if off-screen
  var popup = document.getElementById('dayPopup');
  popup.classList.remove('hidden');

  var PW = 220, PH = 340;
  var vw = window.innerWidth, vh = window.innerHeight;
  var x  = event.clientX, y = event.clientY;

  var left = x + 12;
  var top  = y + 12;
  if (left + PW > vw - 12) left = x - PW - 12;
  if (top  + PH > vh - 12) top  = Math.max(12, vh - PH - 12);
  if (left < 12) left = 12;

  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';

  event.stopPropagation();
}

function closeDayPopup() {
  document.getElementById('dayPopup').classList.add('hidden');
}

function popupScroll(dir) {
  document.getElementById('popupList').scrollBy({ top: dir * 80, behavior: 'smooth' });
}

document.addEventListener('click', function (e) {
  var pop = document.getElementById('dayPopup');
  if (!pop.classList.contains('hidden') && !pop.contains(e.target)) {
    closeDayPopup();
  }
});

// ── Utilities ─────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function _escJs(s) {
  return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className =
    'fixed bottom-6 right-6 z-50 px-4 py-3 rounded-lg text-sm font-medium text-white shadow-lg ' +
    (isError ? 'bg-red-600' : 'bg-green-600');
  el.classList.remove('hidden');
  clearTimeout(el._timer);
  el._timer = setTimeout(function () { el.classList.add('hidden'); }, 3500);
}
</script>
