<script>
// ── Read GAS template vars from DOM ──────────────────────────
var _gasEl     = document.getElementById('gasVars');
var APP_USER   = JSON.parse(_gasEl.getAttribute('data-user') || 'null');
var SCRIPT_URL = _gasEl.getAttribute('data-url') || '';

// ── Sidebar ───────────────────────────────────────────────────
(function () {
  if (!APP_USER) return;
  document.getElementById('sidebarName').textContent  = APP_USER.name;
  document.getElementById('sidebarEmail').textContent = APP_USER.email;

  var items = [
    {
      label: '在宅勤務許可申請', page: 'reports', color: 'text-emerald-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
    },
    {
      label: '日報報告', page: 'task_report', color: 'text-orange-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>',
    },
    {
      label: 'チームカレンダー', page: 'calendar', color: 'text-violet-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/>',
    },
    {
      label: '申請承認', page: 'approve', color: 'text-emerald-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
    },
    {
      label: '社員マスタ管理', page: 'employees', color: 'text-pink-400', active: true,
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>',
    },
    {
      label: '申請履歴', page: 'admin_history', color: 'text-red-400',
      icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>',
    },
  ];

  var nav = document.getElementById('sidebarNav');
  items.forEach(function (item) {
    var a = document.createElement('a');
    a.href = SCRIPT_URL + '?page=' + item.page;
    a.className = [
      'flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-sm font-medium',
      item.active ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white',
    ].join(' ');
    a.innerHTML =
      '<svg class="w-4 h-4 flex-shrink-0 ' + item.color + '" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
      item.icon + '</svg>' + item.label;
    if (!item.active) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('pageLoader').classList.remove('hidden');
        window.top.location.href = SCRIPT_URL + '?page=' + item.page;
      });
    }
    nav.appendChild(a);
  });
})();

// ── State ─────────────────────────────────────────────────────
var allEmployees = [];
var departments  = [];

// ── Load data ─────────────────────────────────────────────────
google.script.run
  .withSuccessHandler(function (data) {
    document.getElementById('tableLoading').classList.add('hidden');
    if (!data || data.error) return;
    allEmployees = data;
    renderTable(data);
    document.getElementById('tableWrap').classList.remove('hidden');
  })
  .withFailureHandler(function () {
    document.getElementById('tableLoading').classList.add('hidden');
  })
  .getAllEmployees();

google.script.run
  .withSuccessHandler(function (data) {
    departments = data || [];
    var sel = document.getElementById('newDept');
    sel.innerHTML = '<option value="">未設定</option>';
    departments.forEach(function (d) {
      var o = document.createElement('option');
      o.value = d.name; o.textContent = d.name;
      sel.appendChild(o);
    });
  })
  .getDepartmentList();

var logoFileId = '1aCQV8AlI7ssdAlLCHOOk-HNnZsK1Jr1D'; // Replace with your file ID
google.script.run
  .withSuccessHandler(function (base64Image) {
    if (base64Image) {
      document.getElementById('logoImg').src = base64Image;
    }
  })
  .withFailureHandler(function (error) {
    console.error('Failed to load logo:', error);
  })
  .getImageAsBase64(logoFileId);
// ── Search filter ─────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function () {
  var q = this.value.toLowerCase();
  var filtered = allEmployees.filter(function (e) {
    return e.name.toLowerCase().includes(q) || e.email.toLowerCase().includes(q);
  });
  renderTable(filtered);
});

// ── Render table ──────────────────────────────────────────────
var ROLE_COLORS = {
  employee: 'bg-blue-100 text-blue-700',
  reviewer: 'bg-violet-100 text-violet-700',
  manager:  'bg-amber-100 text-amber-700',
  admin:    'bg-rose-100 text-rose-700',
};

function renderTable(data) {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-sm text-slate-400">社員が見つかりません</td></tr>';
    return;
  }
  data.forEach(function (emp) {
    var rc  = ROLE_COLORS[emp.role] || 'bg-slate-100 text-slate-700';
    var row = document.createElement('tr');
    row.className = 'hover:bg-slate-50 transition-colors';
    row.innerHTML =
      '<td class="px-6 py-4">' +
        '<div class="flex items-center gap-3">' +
          '<div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-700">' +
            (emp.name ? emp.name.charAt(0) : '?') +
          '</div>' +
          '<span class="text-sm font-medium text-slate-900">' + esc(emp.name) + '</span>' +
        '</div>' +
      '</td>' +
      '<td class="px-6 py-4 text-sm text-slate-600">' + esc(emp.email) + '</td>' +
      '<td class="px-6 py-4 text-sm text-slate-600">' + esc(emp.department) + '</td>' +
      '<td class="px-6 py-4">' +
        '<span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium ' + rc + '">' +
          esc(emp.role) +
        '</span>' +
      '</td>' +
      '<td class="px-6 py-4">' +
        (emp.is_active
          ? '<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium bg-green-100 text-green-700">● Active</span>'
          : '<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium bg-slate-100 text-slate-500">○ Inactive</span>') +
      '</td>' +
      '<td class="px-6 py-4">' +
        '<button onclick="toggleStatus(\'' + emp.id + '\',' + !emp.is_active + ')" ' +
          'class="text-xs text-blue-600 hover:text-blue-800 font-medium">' +
          (emp.is_active ? '無効化' : '有効化') +
        '</button>' +
      '</td>';
    tbody.appendChild(row);
  });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Toggle status ─────────────────────────────────────────────
function toggleStatus(userId, active) {
  google.script.run
    .withSuccessHandler(function (r) {
      if (r && r.error) { showFeedback(r.error, false); return; }
      showFeedback(active ? '有効化しました' : '無効化しました', true);
      reloadEmployees();
    })
    .withFailureHandler(function () { showFeedback('エラーが発生しました', false); })
    .toggleEmployeeStatus(userId, active);
}

// ── Add Employee modal ────────────────────────────────────────
function openAddModal() {
  document.getElementById('addModal').classList.remove('hidden');
  document.getElementById('modalError').classList.add('hidden');
}
function closeAddModal() {
  document.getElementById('addModal').classList.add('hidden');
  ['newName','newEmail','newPassword'].forEach(function (id) {
    document.getElementById(id).value = '';
  });
}

function saveEmployee() {
  var name  = document.getElementById('newName').value.trim();
  var email = document.getElementById('newEmail').value.trim();
  var dept  = document.getElementById('newDept').value;
  var role  = document.getElementById('newRole').value;
  var pass  = document.getElementById('newPassword').value;

  if (!name || !email || !role) {
    showModalError('氏名・メールアドレス・ロールは必須です');
    return;
  }

  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '追加中...';

  google.script.run
    .withSuccessHandler(function (r) {
      btn.disabled = false; btn.textContent = '追加する';
      if (r && r.error) { showModalError(r.error); return; }
      closeAddModal();
      showFeedback(name + ' を追加しました', true);
      reloadEmployees();
    })
    .withFailureHandler(function () {
      btn.disabled = false; btn.textContent = '追加する';
      showModalError('エラーが発生しました');
    })
    .addEmployee({ name: name, email: email, department: dept, role: role, password: pass });
}

function showModalError(msg) {
  var el = document.getElementById('modalError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function showFeedback(msg, ok) {
  var el = document.getElementById('feedbackMsg');
  el.textContent = msg;
  el.className   = 'mt-4 text-sm text-center p-3 rounded-md max-w-md ' +
    (ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700');
  el.classList.remove('hidden');
  setTimeout(function () { el.classList.add('hidden'); }, 4000);
}

function reloadEmployees() {
  allEmployees = [];
  document.getElementById('tableBody').innerHTML = '';
  google.script.run
    .withSuccessHandler(function (data) {
      if (!data || data.error) return;
      allEmployees = data;
      renderTable(data);
    })
    .getAllEmployees();
}

// ── Logout ────────────────────────────────────────────────────
function logout() {
  document.getElementById('pageLoader').classList.remove('hidden');
  google.script.run
    .withSuccessHandler(function (r) { window.top.location.href = r.redirectUrl; })
    .logoutUser();
}
</script>
