// ── Utilities ─────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function statusBadge(status) {
  var MAP = {
    approved:          ['承認済み', 'bg-green-100 text-green-700'],
    submitted:         ['申請中',   'bg-orange-100 text-orange-700'],
    draft:             ['未作成',   'bg-slate-100 text-slate-500'],
    rejected:          ['差戻し',     'bg-red-100 text-red-700'],
    reviewer_approved: ['審査承認', 'bg-blue-100 text-blue-700'],
  };
  var info = MAP[status] || [status || '‐', 'bg-slate-100 text-slate-500'];
  return '<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ' +
    info[1] + '">' + info[0] + '</span>';
}

function statusLabel(status) {
  var MAP = {
    approved:          '承認済み',
    submitted:         '申請中',
    draft:             '未作成',
    rejected:          '差戻し',
    reviewer_approved: '審査承認',
  };
  return MAP[status] || status || '';
}

function getISOWeekLabel(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  var utcD = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var day = utcD.getUTCDay() || 7;
  utcD.setUTCDate(utcD.getUTCDate() + 4 - day);
  var yearStart = new Date(Date.UTC(utcD.getUTCFullYear(), 0, 1));
  var wk = Math.ceil(((utcD - yearStart) / 86400000 + 1) / 7);
  return '第' + wk + '週 ' + utcD.getUTCFullYear();
}

function getMondayKey(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;
  var dow = d.getDay() === 0 ? 6 : d.getDay() - 1; // 0=Mon … 6=Sun
  var mon = new Date(d);
  mon.setDate(d.getDate() - dow);
  return mon.getFullYear() + '-' +
    String(mon.getMonth() + 1).padStart(2, '0') + '-' +
    String(mon.getDate()).padStart(2, '0');
}

function fmtDateShort(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return String(dateStr);
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(tab) {
  _activeTab = tab;
  var activeClass   = 'px-5 py-2 text-sm font-medium rounded-full border transition-colors bg-slate-900 text-white border-slate-900';
  var inactiveClass = 'px-5 py-2 text-sm font-medium rounded-full border transition-colors text-slate-500 border-slate-300 hover:bg-slate-50';
  document.getElementById('tabTelework').className = tab === 'telework' ? activeClass : inactiveClass;
  document.getElementById('tabTask').className     = tab === 'task'     ? activeClass : inactiveClass;
  document.getElementById('searchName').value = '';
  buildWeekOptions();
  applyFilters();
}

// ── Build week dropdown dynamically from data ─────────────────
function buildWeekOptions() {
  var data  = _activeTab === 'telework' ? _teleData : _taskData;
  var seen  = {};
  var weeks = [];

  data.forEach(function (r) {
    var dateStr = _activeTab === 'telework' ? r.request_date : r.report_date;
    var monKey  = getMondayKey(dateStr);
    if (!monKey || seen[monKey]) return;
    seen[monKey] = true;

    var mon = new Date(monKey);
    var sat = new Date(mon);
    sat.setDate(mon.getDate() + 5);

    var weekTitlePart = (_activeTab === 'telework' && r.week_title)
      ? r.week_title
      : getISOWeekLabel(dateStr).split(' ')[0];

    var rangeStr = fmtDateShort(mon) + '（月）〜' + fmtDateShort(sat);
    weeks.push({ key: monKey, label: weekTitlePart + ' ' + rangeStr, ts: mon.getTime() });
  });

  weeks.sort(function (a, b) { return b.ts - a.ts; });

  var sel = document.getElementById('weekFilter');
  var cur = sel.value;
  sel.innerHTML = '<option value="">全期間</option>';
  weeks.forEach(function (w) {
    var opt = document.createElement('option');
    opt.value = w.key;
    opt.textContent = w.label;
    if (w.key === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ── Apply filters ─────────────────────────────────────────────
function applyFilters() {
  var name    = document.getElementById('searchName').value.trim().toLowerCase();
  var weekKey = document.getElementById('weekFilter').value;
  var data    = _activeTab === 'telework' ? _teleData : _taskData;

  _filteredRows = data.filter(function (r) {
    if (name && r.employee_name.toLowerCase().indexOf(name) === -1) return false;
    if (weekKey) {
      var dateStr = _activeTab === 'telework' ? r.request_date : r.report_date;
      if (getMondayKey(dateStr) !== weekKey) return false;
    }
    return true;
  });

  renderTable();
}

// ── Render table ──────────────────────────────────────────────
function renderTable() {
  var wrap  = document.getElementById('tableWrap');
  var empty = document.getElementById('tableEmpty');
  var head  = document.getElementById('tableHeadRow');
  var body  = document.getElementById('tableBody');

  if (_filteredRows.length === 0) {
    wrap.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  wrap.classList.remove('hidden');

  if (_activeTab === 'telework') {
    head.innerHTML =
      thCell('従業員名') + thCell('対象日') + thCell('種類') +
      thCell('ステータス') + thCell('内容（抜粋）') +
      '<th class="px-6 py-3 text-right text-sm font-semibold text-slate-700">操作</th>';
  } else {
    head.innerHTML =
      thCell('従業員名') + thCell('対象日') +
      thCell('ステータス') + thCell('重要事項（抜粋）') +
      '<th class="px-6 py-3 text-right text-sm font-semibold text-slate-700">操作</th>';
  }

  body.innerHTML = '';
  _filteredRows.forEach(function (r) {
    var tr = document.createElement('tr');
    tr.id = 'row-' + r.id;
    tr.className = 'hover:bg-slate-50 transition-colors';

    if (_activeTab === 'telework') {
      var dayDisp  = escHtml(r.request_date || '‐') + (r.day_short ? ' (' + escHtml(r.day_short) + ')' : '');
      var excerpt  = r.notes
        ? escHtml(r.notes.substring(0, 35)) + (r.notes.length > 35 ? '...' : '')
        : '‐';
      tr.innerHTML =
        tdCell('<span class="font-medium text-slate-900">' + escHtml(r.employee_name) + '</span>') +

// ── Delete single record ──────────────────────────────────────
function deleteOne(id, type) {
  if (!window.confirm('このレコードを削除しますか？')) return;
  var row = document.getElementById('row-' + id);
  if (row) row.style.opacity = '0.4';

  var fn = type === 'telework' ? 'adminDeleteTeleworkReport' : 'adminDeleteTaskReport';
  google.script.run
    .withSuccessHandler(function (ok) {
      if (ok) {
        if (type === 'telework') {
          _teleData = _teleData.filter(function (r) { return r.id !== id; });
        } else {
          _taskData = _taskData.filter(function (r) { return r.id !== id; });
        }
        buildWeekOptions();
        applyFilters();
        showToast('削除しました');
      } else {
        if (row) row.style.opacity = '1';
        showToast('削除に失敗しました', true);
      }
    })
    .withFailureHandler(function (err) {
      if (row) row.style.opacity = '1';
      showToast('エラー: ' + ((err && err.message) || '不明'), true);
    })
    [fn](id);
}

// ── Bulk delete ───────────────────────────────────────────────
function bulkDelete() {
  if (_filteredRows.length === 0) {
    showToast('削除する対象がありません', true);
    return;
  }
  if (!window.confirm('表示中の ' + _filteredRows.length + ' 件を削除しますか？\nこの操作は取り消せません。')) return;

  var ids  = _filteredRows.map(function (r) { return r.id; });
  var type = _activeTab;
  var fn   = type === 'telework' ? 'adminDeleteTeleworkReport' : 'adminDeleteTaskReport';
  document.getElementById('pageLoader').classList.remove('hidden');

  var pending = ids.length;
  var failed  = 0;
  ids.forEach(function (id) {
    google.script.run
      .withSuccessHandler(function () {
        pending--;
        if (pending === 0) _afterBulkDelete(ids, type, failed);
      })
      .withFailureHandler(function () {
        pending--;
        failed++;
        if (pending === 0) _afterBulkDelete(ids, type, failed);
      })
      [fn](id);
  });
}

function _afterBulkDelete(ids, type, failed) {
  document.getElementById('pageLoader').classList.add('hidden');
  var idSet = {};
  ids.forEach(function (id) { idSet[id] = true; });
  if (type === 'telework') {
    _teleData = _teleData.filter(function (r) { return !idSet[r.id]; });
  } else {
    _taskData = _taskData.filter(function (r) { return !idSet[r.id]; });
  }
  buildWeekOptions();
  applyFilters();
  var done = ids.length - failed;
  showToast(failed > 0 ? done + '件削除しました（' + failed + '件失敗）' : done + '件削除しました', failed > 0);
}

// ── Export to spreadsheet ─────────────────────────────────────
function exportToSheet() {
  if (_filteredRows.length === 0) {
    showToast('エクスポートする対象がありません', true);
    return;
  }
  var now   = new Date();
  var stamp = now.getFullYear() +
    ('0' + (now.getMonth() + 1)).slice(-2) +
    ('0' + now.getDate()).slice(-2) + '_' +
    ('0' + now.getHours()).slice(-2) +
    ('0' + now.getMinutes()).slice(-2);

  var title, rows;
  if (_activeTab === 'telework') {
    title = '在宅勤務申請_' + stamp;
    rows = _filteredRows.map(function (r) {
      return {
        従業員名:   r.employee_name,
        部署:       r.department,
        対象日:     r.request_date,
        曜日:       r.day_short,
        週:         r.week_title,
        勤務種別:   r.work_type,
        内容:       r.notes,
        ステータス: statusLabel(r.status),
        作成日時:   r.created_at,
      };
    });
  } else {
    title = '日報報告_' + stamp;
    rows = _filteredRows.map(function (r) {
      return {
        従業員名:   r.employee_name,
        部署:       r.department,
        対象日:     r.report_date,
        曜日:       r.day_short,
        重要事項:   r.important_issues,
        翌日の計画: r.next_day_plan,
        ステータス: statusLabel(r.status),
        作成日時:   r.created_at,
      };
    });
  }

  document.getElementById('pageLoader').classList.remove('hidden');
  google.script.run
    .withSuccessHandler(function (res) {
      document.getElementById('pageLoader').classList.add('hidden');
      if (res && res.success) {
        showToast('「' + res.sheetName + '」に ' + rows.length + '件書き込みました');
      } else {
        showToast((res && res.error) ? res.error : 'エクスポートに失敗しました', true);
      }
    })
    .withFailureHandler(function (err) {
      document.getElementById('pageLoader').classList.add('hidden');
      showToast('エラー: ' + ((err && err.message) || '不明'), true);
    })
    .adminExportToSheet(rows, title);
}

              escHtml(d.request_date || '‐') + (d.day_short ? '　(' + escHtml(d.day_short) + ')' : '') +
              '　在宅勤務申請' +
            '</h3>' +
            '<p class="text-xs text-slate-400 mt-0.5">勤務種別: ' + escHtml(d.work_type || '‐') + '</p>' +
          '</div>' +
        '</div>' +
        '<p class="text-xs text-slate-500">従業員: <span class="font-semibold text-slate-700">' + escHtml(d.employee_name) + '</span></p>' +
      '</div>' +
      // Content + Redmine two-column
      '<div class="grid grid-cols-5 gap-4">' +
        '<div class="col-span-3">' +
          '<p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">業務内容・メモ</p>' +
          '<p class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap bg-slate-50 rounded-lg p-4 border border-slate-100 min-h-[80px]">' +
            escHtml(d.notes || '‐') +
          '</p>' +
        '</div>' +
        '<div class="col-span-2">' +
          '<div class="bg-slate-50 rounded-xl border border-slate-200 p-4 h-full">' +
            '<div class="flex items-center gap-2 mb-3 pb-2 border-b border-slate-200">' +
              REDMINE_ICON +
              '<p class="text-xs font-semibold text-slate-600 uppercase tracking-wider">REDMINE API 実績タスク</p>' +
            '</div>' +
            '<div>' + teleworkTasksHtml + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  document.getElementById('detailModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('detailModal').classList.add('hidden');
}

document.getElementById('detailModal').addEventListener('click', function (e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
