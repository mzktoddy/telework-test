// ── Week date helpers ─────────────────────────────────────────
function getThisWeekDates() {
  var today = new Date();
  var dow   = today.getDay();
  var offset = dow === 0 ? -6 : 1 - dow;
  var monday = new Date(today);
  monday.setDate(today.getDate() + offset);
  monday.setHours(0, 0, 0, 0);
  var dates = [];
  for (var i = 0; i < 5; i++) {
    var d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(
      d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0')
    );
  }
  return dates;
}

var weekDates = getThisWeekDates();

// Set header week range (Sunday–Saturday)
(function() {
  var today  = new Date();
  var sunday = new Date(today);
  sunday.setDate(today.getDate() - today.getDay());
  var saturday = new Date(sunday);
  saturday.setDate(sunday.getDate() + 6);
  function fmt(d) {
    return d.getFullYear() + '/' +
      String(d.getMonth()+1).padStart(2,'0') + '/' +
      String(d.getDate()).padStart(2,'0');
  }
  document.getElementById('weekRangeLabel').textContent =
    fmt(sunday) + ' ～ ' + fmt(saturday) + ' の週次サマリー';
})();

// ── Telework bar chart (approved telework only) ─────────────
var chartInstance = null;

// Inline plugin: draw count labels inside (or above) each bar
var countLabelPlugin = {
  id: 'countLabel',
  afterDatasetsDraw: function(chart) {
    var ctx = chart.ctx;
    chart.data.datasets.forEach(function(dataset, di) {
      var meta = chart.getDatasetMeta(di);
      meta.data.forEach(function(bar, idx) {
        var value = dataset.data[idx];
        if (value == null || value <= 0) return;
        var barHeight = Math.abs(bar.base - bar.y);
        ctx.save();
        ctx.font = 'bold 13px Noto Sans JP, sans-serif';
        ctx.textAlign = 'center';
        if (barHeight >= 22) {
          // Inside bar — white text
          ctx.fillStyle = '#ffffff';
          ctx.textBaseline = 'middle';
          ctx.fillText(value + '名', bar.x, bar.y + barHeight / 2);
        } else {
          // Above bar — indigo text
          ctx.fillStyle = '#4f46e5';
          ctx.textBaseline = 'bottom';
          ctx.fillText(value + '名', bar.x, bar.y - 3);
        }
        ctx.restore();
      });
    });
  },
};

function renderTeleworkChart(data) {
  var telework = data.teleworkData.map(function(d) { return d.telework; });

  var ctx = document.getElementById('teleworkChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'bar',
    plugins: [countLabelPlugin],
    data: {
      labels: DAY_LABELS,
      datasets: [
        {
          label: 'テレワーク（承認済）',
          data: telework,
          backgroundColor: '#6366f1',
          hoverBackgroundColor: '#4f46e5',
          borderRadius: 8,
          borderSkipped: false,
          barPercentage: 0.6,
          categoryPercentage: 0.7,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 24 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              return ctx.dataset.label + ': ' + ctx.raw + '名';
            },
          },
        },
      },
      scales: {
        x: {
          grid:   { display: false },
          border: { display: false },
          ticks:  { color: '#64748b', font: { size: 12, weight: '500' } },
        },
        y: {
          beginAtZero: true,
          ticks:  { stepSize: 1, color: '#94a3b8', font: { size: 11 } },
          grid:   { color: '#f1f5f9' },
          border: { display: false },
        },
      },
    },
  });

  // Count chips under chart
  var countsEl = document.getElementById('teleworkCounts');
  countsEl.innerHTML = '';
  data.teleworkData.forEach(function(d) {
    var chip = document.createElement('div');
    chip.style.flex = '1';
    chip.className  = 'text-center';
    chip.innerHTML =
      '<span class="inline-flex items-center gap-1 text-xs">' +
        '<span class="w-2 h-2 rounded-full bg-indigo-500 inline-block"></span>' +
        '<span class="font-bold text-indigo-700">' + d.telework + '名</span>' +
      '</span>';
    countsEl.appendChild(chip);
  });
}

// ── Render weather from GAS data (today + 7 days) ───────────
var JP_DAYS = ['日', '月', '火', '水', '木', '金', '土'];

function weatherCodeToText(code) {
  if (code === null || code === undefined) return '—';
  if (code === 0) return '晴れ';
  if (code <= 2) return '晴れ時々曇り';
  if (code === 3) return '曇り';
  if (code <= 48) return '霧';
  if (code <= 67) return '雨';
  if (code <= 77) return '雪';
  if (code <= 82) return 'にわか雨';
  return '雷雨';
}

function renderWeather(days) {
  var weatherList = document.getElementById('weatherList');
  if (!days || days.error || !Array.isArray(days)) {
    weatherList.innerHTML =
      '<p class="text-xs text-slate-400 text-center py-8">天気情報を取得できませんでした</p>';
    return;
  }
  weatherList.innerHTML = '';
  days.forEach(function(d) {
    var parts = (d.date || '').split('-');
    var dt = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var dayLabel = JP_DAYS[dt.getDay()];
    var weatherText = weatherCodeToText(d.code);
    var row = document.createElement('div');
    row.className = 'flex items-center justify-between py-2.5 border-b border-slate-50 last:border-0';
    row.innerHTML =
      '<span class="text-sm font-semibold text-slate-700 w-8">' + dayLabel + '</span>' +
      '<span class="flex-shrink-0">' +
        (d.code !== null ? weatherIconSVG(d.code) : '<span class="text-slate-300 text-xl">—</span>') +
      '</span>' +
      '<span class="text-xs text-slate-600 flex-1 text-center">' + weatherText + '</span>' +
      '<span class="text-sm font-bold text-slate-800 w-10 text-right">' +
        (d.temp !== null ? d.temp + '°' : '—') +
      '</span>';
    weatherList.appendChild(row);
  });
}

function weatherIconSVG(code) {
  // WMO weather interpretation codes → SVG icon
  if (code === 0) {
    // Clear sky — sun
    return '<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<circle cx="12" cy="12" r="4.5" fill="#FBBF24"/>' +
      '<path d="M12 3v2M12 19v2M3 12h2M19 12h2' +
      'M6.22 6.22l1.42 1.42M16.36 16.36l1.42 1.42' +
      'M6.22 17.78l1.42-1.42M16.36 7.64l1.42-1.42" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>' +
      '</svg>';
  }
  if (code <= 2) {
    // Mainly clear / partly cloudy — sun + small cloud
    return '<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<circle cx="10" cy="9" r="3.5" fill="#FBBF24"/>' +
      '<path d="M10 3.5v2M10 13.5v1.5M4.5 9h2M14 9h1.5M6.4 5.4l1.4 1.4M12.2 11.2l1.4 1.4M6.4 12.6l1.4-1.4" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>' +
      '<path d="M19.5 15.5a3 3 0 00-3-3A4.5 4.5 0 005 15.5H19.5z" fill="#93C5FD"/>' +
      '</svg>';
  }
  if (code === 3) {
    // Overcast — cloud
    return '<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M20 17.5a3.5 3.5 0 000-7 5.5 5.5 0 00-10.5-2.3A4 4 0 104 17.5H20z" fill="#94A3B8"/>' +
      '</svg>';
  }
  if (code <= 48) {
    // Fog
    return '<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M20 11.5a3.5 3.5 0 000-7 5.5 5.5 0 00-10.5-2.3A4 4 0 104 11.5H20z" fill="#CBD5E1"/>' +
      '<path d="M4 15h16M6 18h12" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>' +
      '</svg>';
  }
  if (code <= 67) {
    // Drizzle / Rain
    return '<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M20 14.5a3.5 3.5 0 000-7 5.5 5.5 0 00-10.5-2.3A4 4 0 104 14.5H20z" fill="#93C5FD"/>' +
      '<path d="M8 18v2M12 17v2M16 18v2" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>' +
      '</svg>';
  }
  if (code <= 77) {
    // Snow
    return '<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M20 14.5a3.5 3.5 0 000-7 5.5 5.5 0 00-10.5-2.3A4 4 0 104 14.5H20z" fill="#BAE6FD"/>' +
      '<circle cx="8"  cy="19" r="1.2" fill="#7DD3FC"/>' +
      '<circle cx="12" cy="20" r="1.2" fill="#7DD3FC"/>' +
      '<circle cx="16" cy="19" r="1.2" fill="#7DD3FC"/>' +
      '</svg>';
  }
  if (code <= 82) {
    // Rain showers
    return '<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M20 14.5a3.5 3.5 0 000-7 5.5 5.5 0 00-10.5-2.3A4 4 0 104 14.5H20z" fill="#93C5FD"/>' +
      '<path d="M7 18.5l1 2M11 17.5l1 2M15 18.5l1 2" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>' +
      '</svg>';
  }
  // Thunderstorm (code 95+)
  return '<svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M20 14.5a3.5 3.5 0 000-7 5.5 5.5 0 00-10.5-2.3A4 4 0 104 14.5H20z" fill="#94A3B8"/>' +
    '<path d="M13 16l-3 5h4l-3 5" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';
}

// ── Daily report submission progress bars ─────────────────────
function renderReportStatus(data) {
  var el = document.getElementById('reportStatus');
  el.innerHTML = '';
  data.reportData.forEach(function(d, i) {
    var total = d.submitted + d.missing;
    var pct   = total > 0 ? Math.min(100, Math.round((d.submitted / total) * 100)) : 0;

    var col = document.createElement('div');
    col.innerHTML =
      '<p class="text-sm font-semibold text-slate-900 mb-3">' + DAY_LABELS[i] + '</p>' +
      '<div class="w-full bg-slate-100 rounded-full h-2 mb-3">' +
        '<div class="bg-blue-500 h-2 rounded-full transition-all duration-700" style="width:' + pct + '%"></div>' +
      '</div>' +
      '<p class="text-xs">' +
        '<span class="font-bold text-slate-800">' + d.submitted + '</span>' +
        '<span class="text-slate-500 ml-1">提出済</span>' +
      '</p>' +
      (d.missing > 0
        ? '<p class="text-xs text-slate-400">' + d.missing + ' 未提出</p>'
        : (d.submitted > 0
          ? '<p class="text-xs text-emerald-600 font-medium">全員提出済 ✓</p>'
          : '<p class="text-xs text-slate-400">未提出</p>'));
    el.appendChild(col);
  });
}
</script>
</body>
</html>
