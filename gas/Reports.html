// ── Week helpers ──────────────────────────────────────────────
function getWeekNumber(d) {
  var startOfYear = new Date(d.getFullYear(), 0, 1);
  
  // その年の最初の日曜日を求める
  var firstSunday = new Date(startOfYear);
  var dayOfWeek = startOfYear.getDay();
  if (dayOfWeek !== 0) {
    firstSunday.setDate(startOfYear.getDate() + (7 - dayOfWeek));
  }
  
  // 最初の日曜日より前なら第1週
  if (d < firstSunday) {
    return 1;
  }
  
  // 最初の日曜日からの週番号を計算する
  var daysSinceFirstSunday = Math.floor((d - firstSunday) / (24 * 60 * 60 * 1000));
  var weekNumber = Math.floor(daysSinceFirstSunday / 7) + 1;
  
  return weekNumber;
}

function getSundayOfWeek(offset) {
  var today = new Date();
  var day = today.getDay(); // 0 = Sunday, 1 = Monday, ..., 6 = Saturday
  var sunday = new Date(today);
  sunday.setDate(today.getDate() - day + offset * 7);
  sunday.setHours(0, 0, 0, 0);
  return sunday;
}

function fmtDate(d) {
  return d.getFullYear() + '/' +
    String(d.getMonth() + 1).padStart(2, '0') + '/' +
    String(d.getDate()).padStart(2, '0');
}

function isoDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

// ── Populate week selector ────────────────────────────────────

}

// ── Render week ───────────────────────────────────────────────
function renderWeek() {
  var offset = parseInt(weekSel.value) || 0;
  var sun    = getSundayOfWeek(offset);
  var sat    = new Date(sun); sat.setDate(sun.getDate() + 6);
  var weekNo = getWeekNumber(sun);

  document.getElementById('weekLabel').textContent = '第' + weekNo + '週';
  document.getElementById('weekRange').textContent = fmtDate(sun) + '（' + DAY_SHORTS[0] + '）～' + fmtDate(sat) + '（' + DAY_SHORTS[6] + '）';
  document.getElementById('monthLabel').textContent =
    sun.getFullYear() + '年' + String(sun.getMonth() + 1).padStart(2, '0') + '月';

  // シート内の対象週の行を検索する（複数日のレコードが週単位でグループ化される）
  var sunStr     = isoDate(sun);
  var satStr     = isoDate(sat);
  var weekReport = null;
  for (var r = 0; r < myReports.length; r++) {
    if (myReports[r].start_date === sunStr && myReports[r].end_date === satStr) {
      weekReport = myReports[r];
      break;
    }
  }

  // Pre-populate dayData from existing report tasks
  var prevDayData = dayData; // 現在のステート（楽観的更新後かもしれない）への参照を保持する
  var tempData = makeFreshDayData();
  if (weekReport && Array.isArray(weekReport.tasks)) {
    weekReport.tasks.forEach(function (dayTask) {
      // dayTask: {date, dayShort, workType, notes, redmineTasks, status}
      var taskDate = new Date(dayTask.date + 'T00:00:00'); // ローカル日付としてパースする
      var dayIndex = Math.round((taskDate - sun) / 86400000);
      if (dayIndex >= 0 && dayIndex < 7) {
        tempData[dayIndex].workType     = dayTask.workType     || '在宅勤務';
        tempData[dayIndex].notes        = dayTask.notes        || '';
        tempData[dayIndex].redmineTasks = dayTask.redmineTasks || [];
        tempData[dayIndex].edited       = true; // シートに保存済み
        tempData[dayIndex].savedStatus  = dayTask.status; // 保存済みステータスを記憶する
        if (dayTask.status === 'rejected') {
          tempData[dayIndex]._origNotes      = dayTask.notes || '';
          tempData[dayIndex]._origWorkType   = dayTask.workType || '在宅勤務';
          tempData[dayIndex]._origRedmineIds = (dayTask.redmineTasks || []).map(function (t) { return String(t.id); }).sort().join(',');
        }
      }
    });
  }
  // マージ: サーバーデータが追いついていない場合に楽観的ローカルステートを保持する
  for (var k = 0; k < 7; k++) {
    // 取り下げ中・申請中フラグは常に引き継ぐ（tempData はこれらを知らない）
    if (prevDayData[k] && prevDayData[k].withdrawing) {
      tempData[k].withdrawing = true;
    }
    if (prevDayData[k] && prevDayData[k].submitting) {
      tempData[k].submitting = true;
    }
    if (prevDayData[k] && prevDayData[k].deleting) {
      tempData[k].deleting = true;
    }
    if (prevDayData[k] && prevDayData[k].saving) {
      tempData[k].saving = true;
    }
    if (prevDayData[k] && prevDayData[k].savedStatus && !tempData[k].savedStatus) {
      // サーバーにまだレコードではないが、楽観的にステータスを設定済み — そのまま保持する
      tempData[k].savedStatus  = prevDayData[k].savedStatus;
      tempData[k].edited       = prevDayData[k].edited;
      tempData[k].workType     = prevDayData[k].workType;
      tempData[k].notes        = prevDayData[k].notes;
      tempData[k].redmineTasks = prevDayData[k].redmineTasks;
    } else if (prevDayData[k] && prevDayData[k].savedStatus &&
               tempData[k].savedStatus &&
               _statusRank(prevDayData[k].savedStatus) > _statusRank(tempData[k].savedStatus)) {
      // ローカルの楽観的ステータスがサーバーよりかなり先行している（例: ローカル=submitted、サーバー=draft）
      tempData[k].savedStatus = prevDayData[k].savedStatus;
    }
  }
  dayData = tempData;

  var weekStatus = weekReport ? weekReport.status : 'none';
  var container  = document.getElementById('dayCards');
  container.innerHTML = '';
  for (var i = 0; i < 7; i++) {
    var d = new Date(sun); d.setDate(sun.getDate() + i);
    container.appendChild(makeDayCard(d, DAY_SHORTS[i], weekStatus, i, weekReport));
  }
  
  // Update submit button — 申請 / 再申請 / 取り下げ
  var submitBtn     = document.getElementById('submitWeekBtn');
  var submitBtnText = document.getElementById('submitBtnText');
  if (submitBtnText && submitBtn) {
    // 取り下げ処理中はボタンの状態をそのままにする
    // （withdrawSubmittedWeek() が設定したスピナー表示・無効化状態を上書きしないように）
    var isWithdrawingAny = false;
    for (var ci = 0; ci < 7; ci++) {
      if (dayData[ci] && dayData[ci].withdrawing) { isWithdrawingAny = true; break; }
    }
    if (isWithdrawingAny) return;

    submitBtn.disabled = false;
    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
    var hasRejected  = false;
    var hasSubmitted = false;
    for (var j = 0; j < 7; j++) {
      if (dayData[j].savedStatus === 'rejected')  hasRejected  = true;
      if (dayData[j].savedStatus === 'submitted') hasSubmitted = true;
    }
    var iconPath = document.getElementById('submitBtnIconPath');
    if (hasSubmitted && !hasRejected) {
    // 申請待機中 → 「取り下げ」を表示する
      submitBtnText.textContent = '取り下げ';
      submitBtn.className = 'w-full h-11 px-6 bg-slate-900 hover:bg-slate-800 text-white text-lg font-medium rounded-full transition-colors flex items-center justify-center gap-2';
      submitBtn.setAttribute('onclick', 'withdrawSubmittedWeek()');
      if (iconPath) iconPath.setAttribute('d', 'M6 18L18 6M6 6l12 12');
    } else {
      submitBtnText.textContent = hasRejected ? '再申請' : '申請';
      submitBtn.className = 'w-full h-11 px-6 bg-slate-900 hover:bg-slate-800 text-white text-lg font-medium rounded-full transition-colors flex items-center justify-center gap-2';
      submitBtn.setAttribute('onclick', 'submitWeek()');
      if (iconPath) iconPath.setAttribute('d', 'M13 7l5 5m0 0l-5 5m5-5H6');
    }
  }
}

function statusBadgeHtml(status) {
  var map = {
    none:              { label: '未作成',     cls: 'bg-slate-100 text-slate-700' },
    draft:             { label: '作製中',     cls: 'bg-blue-100 text-blue-700' },
    submitted:         { label: '申請中',     cls: 'bg-orange-100 text-orange-700' },
    reviewed:          { label: '照査済',     cls: 'bg-yellow-100 text-yellow-700' },
    approved:          { label: '承認済',     cls: 'bg-green-100 text-green-700' },
    rejected:          { label: '差戻し',       cls: 'bg-red-100 text-red-700' },
  };
  var s = map[status] || map.none;
  return '<span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-medium ' +
    s.cls + '">' + s.label + '</span>';
}

// ── Status rank for optimistic merge (higher = further in workflow) ──
function _statusRank(s) {
  var ranks = { none: 0, draft: 1, submitted: 2, reviewed: 3, approved: 4, rejected: 0 };
  return ranks[s] || 0;
}

// ── Make day card ─────────────────────────────────────────────
function makeDayCard(d, dayShort, status, idx, weekReport) {
  var div = document.createElement('div');
  
  // Use savedStatus from dayData (set during renderWeek from server data)
  var dayStatus     = (dayData[idx] && dayData[idx].savedStatus) ? dayData[idx].savedStatus : 'none';
  var isWithdrawing = !!(dayData[idx] && dayData[idx].withdrawing);
  var isSubmitting  = !!(dayData[idx] && dayData[idx].submitting);
  var isProcessing  = isWithdrawing || isSubmitting;

  div.className = [
    'flex items-start justify-between p-4 bg-white border rounded-lg transition-all',
    isProcessing ? 'opacity-60 pointer-events-none' : 'cursor-pointer hover:shadow-md',
    selectedDayIdx === idx ? 'border-blue-400 border-2' : 'border-slate-200',
  ].join(' ');
  
  var dateStr = 
    '<div class="flex flex-col items-center justify-center border-slate-300 border-2 p-2 bg-blue-50 rounded-md min-w-16 h-16">' +
      '<span class="text-2xl font-bold text-slate-900">' + d.getDate() + '</span>' +
      '<span class="text-xs font-medium text-amber-900 uppercase mt-1">' + dayShort + '</span>' +
    '</div>';

  var statusHtml = isWithdrawing
    ? '<span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-medium bg-slate-100 text-slate-500">' +
      '<div class="w-3 h-3 border-2 border-slate-300 border-t-slate-500 rounded-full animate-spin"></div>取り下げ中</span>'
    : isSubmitting
    ? '<span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-medium bg-orange-100 text-orange-600">' +
      '<div class="w-3 h-3 border-2 border-orange-300 border-t-orange-600 rounded-full animate-spin"></div>申請中...</span>'
    : statusBadgeHtml(dayStatus);
  
  // Add delete button for draft or rejected status
  var deleteBtn = '';
  if (dayStatus === 'draft' || dayStatus === 'rejected') {
    deleteBtn = '<button id="deleteDayBtn_' + idx + '" onclick="event.stopPropagation(); deleteDay(' + idx + ', \'' + isoDate(d) + '\');" ' +
      'class="ml-2 p-1.5 text-red-800 hover:bg-red-100 rounded-lg transition-colors flex-shrink-0" ' +
      'title="この日の申請を削除">' +
      '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" ' +
          'd="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>' +
      '</svg>' +
    '</button>';
  }
  
  div.innerHTML = '<div class="flex items-center justify-between w-full">' +
    '<div class="flex items-center gap-4 flex-1">' + dateStr + '<div>' + statusHtml + '</div></div>' +
    deleteBtn +
  '</div>';
  
  div.addEventListener('click', function () {
    // 処理中のカードがあるか確認する
    var isAnyProcessing = dayData.some(function(day) {
      return day.submitting || day.withdrawing || day.deleting || day.saving;
    });
    
    if (isAnyProcessing) {
      // クリックされたカードの代わりに詳細パネルに処理中メッセージを表示する
      document.getElementById('detailDateLabel').textContent = '処理中...';
      document.getElementById('detailPanel').innerHTML =
        '<div class="flex flex-col items-center justify-center gap-4 py-16">' +
          '<div class="w-12 h-12 border-4 border-orange-200 border-t-orange-600 rounded-full animate-spin"></div>' +
          '<p class="text-base font-medium text-slate-900">処理中です</p>' +
          '<p class="text-sm text-slate-500">処理が完了するまでお待ちください</p>' +
        '</div>';
      return;
    }
    
    selectedDayIdx = idx;
    renderWeek();
    openDetailPanel(d, dayShort, idx, weekReport);
  });
  return div;
}

  if (weekReport && weekReport.tasks) {

              '<p class="font-semibold text-red-800 text-sm mb-2">差戻し理由</p>' +
              '<p class="text-xs text-red-600 mb-3">※ この日の申請は差し戻されました。理由を確認して修正後、再申請してください。</p>';
        rejectedApprovals.forEach(function (a) {
          var approverLevel = a.level === '1' ? '照査者' : a.level === '2' ? '承認者' : '承認者';
          rejectionHtml += '<div class="mb-3 pb-3 border-b border-red-200 last:border-0">' +
            '<p class="text-xs text-red-600 font-medium mb-1">' + approverLevel + 'からの差戻し</p>' +
            '<p class="text-sm text-red-900">' + escapeHtml(a.comment || '理由が記載されていません') + '</p>' +
            (a.decided_at ? '<p class="text-xs text-red-500 mt-1">差戻し日時: ' + a.decided_at.split('T')[0] + '</p>' : '') +
          '</div>';
        });
        rejectionHtml += '</div></div></div>';

  document.getElementById('detailDateLabel').textContent =

  var panel = document.getElementById('detailPanel');
  panel.innerHTML = weekInfoHtml + rejectionHtml +
    // Redmine 同期カード
    '<div class="p-6 mb-6 border-dashed border-2 border-slate-300 bg-blue-50 rounded-lg">' +
      '<div class="flex items-start gap-3">' +
        '<span class="text-2xl leading-none">📄</span>' +
        '<div class="flex-1">' +
          '<p class="font-medium text-slate-800 text-sm">Redmineから計画されたタスクを同期</p>' +
          '<p class="text-xs text-slate-500 mt-1">この日にアクティブなRedmineタスクを自動で取り込みます。</p>' +
        '</div>' +
      '</div>' +
      '<button id="syncBtn_' + idx + '" onclick="syncRedmine(' + idx + ')" ' +
        'class="mt-4 w-full h-9 border border-slate-400 bg-white hover:bg-slate-50 text-slate-700 text-sm font-medium rounded-full transition-colors">' +
        (data.redmineTasks && data.redmineTasks.length > 0 ? 'Redmineタスクを再読み込み' : 'Redmineと同期') +
      '</button>' +
      '<div id="redmineList_' + idx + '" class="mt-3 space-y-2"></div>' +
    '</div>' +
    // 勤務種別セレクト
    '<div class="mb-4">' +
      '<label class="text-xs font-medium text-slate-700 block mb-1">勤務種別</label>' +
      '<select id="workType_' + idx + '" ' +

        '<option value="在宅勤務"'  + (data.workType === '在宅勤務'  ? ' selected' : '') + '>在宅勤務</option>' +
        '<option value="オフィス勤務"' + (data.workType === 'オフィス勤務' ? ' selected' : '') + '>オフィス勤務</option>' +
      '</select>' +

        'placeholder="" ' +

      '</textarea>' +
    '</div>' +
    // アクションボタン
    '<div class="flex gap-3">' +
      '<button onclick="saveDay(' + idx + ')" ' +
        'class="flex-1 h-10 px-6 bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium rounded-full transition-colors">' +
        '保存' +
      '</button>' +

  // If already has saved tasks, render them as checked checkboxes

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Redmine タスクを同期カードに表示する
// fromSavedData=true → DB からの読み込み（締めて表示）
// fromSavedData=false → API からの新規同期（インタラクティブなチェックボックス）
function renderRedmineTasks(idx, tasks, fromSavedData) {
  var container = document.getElementById('redmineList_' + idx);
  if (!container) return;

  if (!tasks || tasks.length === 0) {
    container.innerHTML = '';
    return;
  }

  if (fromSavedData) {
    container.innerHTML = '<p class="text-xs text-slate-600 mb-2 font-semibold">保存されたタスク:</p>' +
      tasks.map(function (t) {
        return '<div class="text-xs bg-white border border-green-300 rounded px-3 py-2 text-slate-700">' +
          '<div class="flex items-center gap-2">' +
            '<span class="text-green-600">✓</span>' +
            '<div class="flex-1">' +
              '<span class="font-medium">#' + escapeHtml(String(t.id || '')) + '</span> ' +
              '<span>' + escapeHtml(t.subject || '') + '</span>' +
              (t.project ? '<div class="text-xs text-slate-500 mt-0.5">' + escapeHtml(t.project) + '</div>' : '') +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    return;
  }

  // 新規同期 — インタラクティブな検索きチェックボックス
  var savedIds = dayData[idx].redmineTasks.map(function (t) { return t.id; });
  var taskItemsHtml = tasks.map(function (t) {
    var isChecked = savedIds.indexOf(t.id) > -1;
    return '<label data-id="' + t.id + '" data-subject="' + escapeHtml(t.subject).toLowerCase() + '" ' +
      'class="flex items-start gap-2 p-2 bg-white border border-slate-200 rounded cursor-pointer hover:bg-slate-50 transition-colors">' +
      '<input type="checkbox" value="' + t.id + '" ' + (isChecked ? 'checked' : '') + ' ' +
        'onchange="toggleRedmineTask(' + idx + ',' + t.id + ',this.checked)" ' +
        'class="mt-0.5 rounded border-slate-300 text-blue-600 focus:ring-2 focus:ring-blue-300" />' +
      '<div class="flex-1 text-xs">' +
        '<div class="font-medium text-slate-900">#' + escapeHtml(String(t.id)) + ' ' + escapeHtml(t.subject) + '</div>' +
        '<div class="text-slate-500 mt-0.5">' +
          (t.project ? escapeHtml(t.project) : '') +
          (t.tracker  ? ' · ' + escapeHtml(t.tracker)  : '') +
          (t.status   ? ' · ' + escapeHtml(t.status)   : '') +
          (t.priority ? ' · ' + escapeHtml(t.priority) : '') +
          (t.dueDate  ? ' · 期限: ' + t.dueDate        : '') +
        '</div>' +
      '</div>' +
    '</label>';
  }).join('');

  container.innerHTML =
    '<div class="relative mb-2">' +
      '<span class="absolute inset-y-0 left-2.5 flex items-center text-slate-400 pointer-events-none">' +
        '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
          '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>' +
        '</svg>' +
      '</span>' +
      '<input type="text" id="redmineSearch_' + idx + '" ' +
        'placeholder="チケット番号・件名で絞り込み..." ' +
        'oninput="filterRedmineTasks(' + idx + ')" ' +
        'class="w-full pl-8 pr-3 py-1.5 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-blue-300" />' +
    '</div>' +
    '<p class="text-xs text-slate-600 mb-2 font-semibold">選択可能なタスク (' + tasks.length + '件):</p>' +
    '<div id="redmineTaskList_' + idx + '" class="space-y-1">' + taskItemsHtml + '</div>' +
    '<p id="redmineNoMatch_' + idx + '" class="hidden text-xs text-slate-400 italic mt-1">一致するチケットが見つかりません</p>';
}

// チケット番号またはタイトルでチケット一覧をフィルタリングする
function filterRedmineTasks(idx) {
  var input   = document.getElementById('redmineSearch_' + idx);
  var list    = document.getElementById('redmineTaskList_' + idx);
  var noMatch = document.getElementById('redmineNoMatch_' + idx);
  if (!input || !list) return;

  var query   = input.value.trim().toLowerCase();
  var labels  = list.querySelectorAll('label');
  var visible = 0;

  labels.forEach(function (label) {
    var id      = String(label.getAttribute('data-id') || '');
    var subject = String(label.getAttribute('data-subject') || '');
    var matches = !query || id.indexOf(query) > -1 || subject.indexOf(query) > -1;
    label.style.display = matches ? '' : 'none';
    if (matches) visible++;
  });

  if (noMatch) noMatch.classList.toggle('hidden', visible > 0);
}

// Redmine タスクのチェックボックストグルを処理する
function toggleRedmineTask(idx, taskId, checked) {
  var allTasks = availableTasks[idx] || [];
  var task = allTasks.find(function (t) { return t.id === taskId; });
  if (!task) return;
  if (checked) {
    var exists = dayData[idx].redmineTasks.some(function (t) { return t.id === taskId; });
    if (!exists) dayData[idx].redmineTasks.push(task);
  } else {
    dayData[idx].redmineTasks = dayData[idx].redmineTasks.filter(function (t) {
      return t.id !== taskId;
    });
  }
}

// ── Save day — writes draft to sheet immediately ───────────────
function saveDay(idx) {
  var wt = document.getElementById('workType_' + idx);
  var nt = document.getElementById('notes_' + idx);
  if (!wt || !nt) return;

  // バリデーション: 業務内容か Redmine タスクのどちらかが入力されていること
  var notesValue = nt.value.trim();
  var hasRedmine = dayData[idx].redmineTasks && dayData[idx].redmineTasks.length > 0;
  if (!notesValue && !hasRedmine) {
    showDayMsg(idx, '業務内容・タスクまたはRedmineタスクを入力してください', false);
    nt.focus();
    return;
  }
  // 先にローカルのステートを更新する
  dayData[idx].workType = wt.value;
  dayData[idx].notes    = nt.value;
  dayData[idx].edited   = true;
  dayData[idx].savedStatus = 'draft'; // 楽観的更新 — カードのバッジを即座に更新
  dayData[idx].saving      = true;

  var offset = parseInt(weekSel.value) || 0;
  var sun    = getSundayOfWeek(offset);
  var sat    = new Date(sun); sat.setDate(sun.getDate() + 6);
  var date   = new Date(sun); date.setDate(sun.getDate() + idx);

  var payload = {
    startDate:    isoDate(sun),
    endDate:      isoDate(sat),
    date:         isoDate(date),
    dayShort:     DAY_SHORTS[idx],
    workType:     dayData[idx].workType,
    notes:        dayData[idx].notes,
    redmineTasks: dayData[idx].redmineTasks || [],
  };

  // Re-render cards immediately (optimistic badge update)
  renderWeek();
  // Re-open detail panel so user sees their form + message
  openDetailPanel(date, DAY_SHORTS[idx], idx, _findWeekReport());
  showDayMsg(idx, '<div class="flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-green-600/30 border-t-green-600 rounded-full animate-spin"></div>保存中...</div>', true);
  
  // 保存中は保存ボタンを無効化する
  var saveBtn = document.querySelector('button[onclick="saveDay(' + idx + ')"]');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.classList.add('opacity-50', 'cursor-not-allowed'); }

  google.script.run
    .withSuccessHandler(function (r) {
      dayData[idx].saving = false;
      // Re-enable save button
      var saveBtn = document.querySelector('button[onclick="saveDay(' + idx + ')"]');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.classList.remove('opacity-50', 'cursor-not-allowed'); }
      
      if (r && r.error) {
        // エラー時に楽観的ステータスを元に戻す
        dayData[idx].savedStatus = null;
        dayData[idx].edited = false;
        renderWeek();
        openDetailPanel(date, DAY_SHORTS[idx], idx, _findWeekReport());
        showDayMsg(idx, r.error, false);
        return;
      }
      showDayMsg(idx, '💾 下書き保存しました (ステータス: 作製中)', true);
      // サーバー保存確認済み: 楽観更新のdayDataで即座に再描画（追加取得不要）
      renderWeek();
      if (selectedDayIdx === idx) {
        openDetailPanel(date, DAY_SHORTS[idx], idx, _findWeekReport());
      }
    })
    .withFailureHandler(function () {
      dayData[idx].saving = false;
      // Re-enable save button
      var saveBtn = document.querySelector('button[onclick="saveDay(' + idx + ')"]');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.classList.remove('opacity-50', 'cursor-not-allowed'); }
      
      dayData[idx].savedStatus = null;
      dayData[idx].edited = false;
      renderWeek();
      openDetailPanel(date, DAY_SHORTS[idx], idx, _findWeekReport());
      showDayMsg(idx, '保存に失敗しました', false);
    })
    .saveDayDraft(payload);
}

function cancelDay(idx) {
  selectedDayIdx = null;
  document.getElementById('detailDateLabel').textContent = '日を選択してください';
  document.getElementById('detailPanel').innerHTML =
    '<p class="text-sm text-slate-400">左のカレンダーから申請する日を選択してください。</p>';
  renderWeek();
}

// ── Delete day — removes draft or rejected day from sheet ─────
function deleteDay(idx, dateStr) {
  if (!confirm('この日の申請を削除してもよろしいですか？\n\n日付: ' + dateStr + '\n\nこの操作は取り消せません。')) {
    return;
  }

  dayData[idx].deleting = true;
  
  // 削除ボタンをスピナーに切り替える
  var _delBtn = document.getElementById('deleteDayBtn_' + idx);
  var _delBtnOrig = _delBtn ? _delBtn.innerHTML : null;
  if (_delBtn) {
    _delBtn.disabled = true;
    _delBtn.innerHTML = '<div class="w-5 h-5 border-2 border-red-300 border-t-red-700 rounded-full animate-spin"></div>';
  }
  renderWeek();

  // 詳細パネルにスピナーを表示する
  selectedDayIdx = null;
  document.getElementById('detailDateLabel').textContent = '日を選択してください';
  document.getElementById('detailPanel').innerHTML =
    '<div class="flex flex-col items-center justify-center gap-3 py-16">' +
      '<div class="w-8 h-8 border-4 border-slate-200 border-t-slate-700 rounded-full animate-spin"></div>' +
      '<p class="text-sm text-slate-500">削除中...</p>' +
    '</div>';

  var offset = parseInt(weekSel.value) || 0;
  var sun    = getSundayOfWeek(offset);
  var sat    = new Date(sun); sat.setDate(sun.getDate() + 6);
  var payload = {
    startDate: isoDate(sun),
    endDate:   isoDate(sat),
    date:      dateStr,
  };

  google.script.run
    .withSuccessHandler(function (r) {
      dayData[idx].deleting = false;
      if (r && r.error) {
        if (_delBtn && _delBtnOrig) { _delBtn.innerHTML = _delBtnOrig; _delBtn.disabled = false; }
        document.getElementById('detailPanel').innerHTML =
          '<p class="text-sm text-slate-400">左のカレンダーから申請する日を選択してください。</p>';
        renderWeek();
        alert('削除エラー: ' + r.error);
        return;
      }
      dayData[idx] = { workType: '在宅勤務', notes: '', redmineTasks: [], edited: false, savedStatus: null };
      document.getElementById('detailPanel').innerHTML =
        '<p class="text-sm text-slate-400">左のカレンダーから申請する日を選択してください。</p>';
      // サーバー削除確認済み: ローカルのmyReportsから対象タスクを除去（追加取得不要）
      for (var mr = 0; mr < myReports.length; mr++) {
        if (myReports[mr].start_date === payload.startDate && myReports[mr].end_date === payload.endDate) {
          if (myReports[mr].tasks) {
            myReports[mr].tasks = myReports[mr].tasks.filter(function(t) { return t.date !== payload.date; });
          }
          break;
        }
      }
      renderWeek();
    })
    .withFailureHandler(function (err) {
      dayData[idx].deleting = false;
      if (_delBtn && _delBtnOrig) { _delBtn.innerHTML = _delBtnOrig; _delBtn.disabled = false; }
      document.getElementById('detailPanel').innerHTML =
        '<p class="text-sm text-slate-400">左のカレンダーから申請する日を選択してください。</p>';
      renderWeek();
      alert('削除に失敗しました: ' + (err && err.message ? err.message : '不明なエラー'));
    })
    .deleteTeleworkDay(payload);
}

function showDayMsg(idx, msg, ok) {
  var el = document.getElementById('dayMsg_' + idx);
  if (!el) return;
  el.innerHTML = msg;
  el.className   = 'mt-3 text-sm text-center p-2 rounded-md ' +
    (ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700');
  el.classList.remove('hidden');
  // 成功メッセージは自動非表示、エラーメッセージは次の操作まで表示する
  if (ok) { setTimeout(function () { el.classList.add('hidden'); }, 2500); }
}

// ── Non-blocking toast notification ──────────────────────────
function showToast(msg, isSuccess) {
  var toast = document.createElement('div');
  toast.className = 'fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl shadow-xl text-sm font-medium ' +
    (isSuccess ? 'bg-slate-900 text-white' : 'bg-red-700 text-white');
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
  }, 3000);
}

// ── Helper to find current week's report from myReports ───────
function _findWeekReport() {
  var offset = parseInt(weekSel.value) || 0;
  var sun    = getSundayOfWeek(offset);
  var sat    = new Date(sun); sat.setDate(sun.getDate() + 6);
  var sunStr = isoDate(sun);
  var satStr = isoDate(sat);
  for (var r = 0; r < myReports.length; r++) {
    if (myReports[r].start_date === sunStr && myReports[r].end_date === satStr) {
      return myReports[r];
    }
  }
  return null;
}

// ── Sync Redmine tasks ────────────────────────────────────────
function syncRedmine(idx) {
  var btn = document.getElementById('syncBtn_' + idx);
  if (!btn) return;
  btn.innerHTML = '<div class="flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-slate-600/30 border-t-slate-600 rounded-full animate-spin"></div>同期中...</div>';
  btn.disabled    = true;
  btn.classList.add('opacity-75', 'cursor-not-allowed');
  google.script.run
    .withSuccessHandler(function (result) {
      var msgEl = document.getElementById('redmineList_' + idx);

      // サーバーがエラーオブジェクトを返した場合（例: Redmine アカウントで認識できない場合）
      if (result && !Array.isArray(result) && result.error) {
        if (msgEl) {
          msgEl.innerHTML =
            '<p class="text-xs text-red-600 italic">' + escapeHtml(result.error) + '</p>';
        }
        btn.textContent = 'Redmineと同期';
        btn.disabled    = false;
        btn.classList.remove('opacity-75', 'cursor-not-allowed');
        return;
      }

      var tasks = Array.isArray(result) ? result : [];
      availableTasks[idx] = tasks;

      if (tasks.length === 0) {
        if (msgEl) {
          msgEl.innerHTML =
            '<p class="text-xs text-slate-500 italic">オープンなRedmineタスクが見つかりません</p>';
        }
        btn.textContent = 'Redmineと同期';
        btn.disabled    = false;
        btn.classList.remove('opacity-75', 'cursor-not-allowed');
        return;
      }
      renderRedmineTasks(idx, tasks, false);
      btn.textContent = 'Redmineタスクを再読み込み';
      btn.disabled    = false;
      btn.classList.remove('opacity-75', 'cursor-not-allowed');
    })
    .withFailureHandler(function (err) {
      var msgEl = document.getElementById('redmineList_' + idx);
      if (msgEl) {
        msgEl.innerHTML =
          '<p class="text-xs text-red-600 italic">同期エラー: ' +
          escapeHtml(String(err && err.message ? err.message : '不明なエラー')) + '</p>';
      }
      btn.textContent = 'Redmineと同期';
      btn.disabled    = false;
      btn.classList.remove('opacity-75', 'cursor-not-allowed');
    })
    .getRedmineTasks();
}

function submitWeek() {
  var offset = parseInt(weekSel.value) || 0;
  var sun    = getSundayOfWeek(offset);
  var sat    = new Date(sun); sat.setDate(sun.getDate() + 6);
  
  // 差戴された日があるか確認して再申請か判定する
  var hasRejectedDays = false;
  for (var rc = 0; rc < 7; rc++) {
    if (dayData[rc].savedStatus === 'rejected') {
      hasRejectedDays = true;
      break;
    }
  }
  var isResubmission = hasRejectedDays;

  // 下書きまたは差戴された日があるか確認する
  var hasDrafts = false;
  for (var c = 0; c < 7; c++) {
    if (dayData[c].edited && (dayData[c].savedStatus === 'draft' || dayData[c].savedStatus === 'rejected')) { 
      hasDrafts = true; 
      break; 
    }
  }
  if (!hasDrafts) {
    alert((isResubmission ? '再申請' : '申請') + 'する日がありません。\n\n先に「保存」ボタンで日ごとに下書き保存してください。');
    return;
  }

  // 申請対象の各日の内容を検証する
  var _emptyDates = [];
  var _unchangedRejectedDates = [];
  for (var _v = 0; _v < 7; _v++) {
    var _vd = dayData[_v];
    if (!_vd.edited || (_vd.savedStatus !== 'draft' && _vd.savedStatus !== 'rejected')) continue;
    var _vdate = new Date(sun); _vdate.setDate(sun.getDate() + _v);
    var _vHasRedmine = _vd.redmineTasks && _vd.redmineTasks.length > 0;
    if ((!_vd.notes || !_vd.notes.trim()) && !_vHasRedmine) {
      _emptyDates.push(fmtDate(_vdate));
    }
    if (_vd.savedStatus === 'rejected' && _vd._origNotes !== null) {
      var _vIds = (_vd.redmineTasks || []).map(function (t) { return String(t.id); }).sort().join(',');
      if (_vd.notes.trim() === (_vd._origNotes || '').trim() && _vd.workType === _vd._origWorkType && _vIds === _vd._origRedmineIds) {
        _unchangedRejectedDates.push(fmtDate(_vdate));
      }
    }
  }
  if (_emptyDates.length > 0) {
    alert('以下の日付は業務内容・タスクとRedmineタスクがどちらも未入力です。\n先に各日の「保存」ボタンで入力してください。\n\n' + _emptyDates.join('\n'));
    return;
  }
  if (_unchangedRejectedDates.length > 0) {
    alert('差戻しされた申請に変更がありません。\n各差戻し日の内容を修正するか、不要な場合は削除してから再申請してください。\n\n対象日:\n' + _unchangedRejectedDates.join('\n'));
    return;
  }

  var days = dayData.map(function (d, i) {
    var date = new Date(sun); date.setDate(sun.getDate() + i);
    return {
      date:         isoDate(date),
      dayShort:     DAY_SHORTS[i],
      workType:     d.workType,
      notes:        d.notes,
      redmineTasks: d.redmineTasks,
      edited:       !!d.edited,
    };
  });

  var weekPayload = {
    startDate: isoDate(sun),
    endDate:   isoDate(sat),
    days:      days,
  };

  // 申請対象日に検索中フラグを立て、ステータスを楽観的に更新する
  var prevStatuses = [];
  var submittingDays = [];
  for (var j = 0; j < 7; j++) {
    prevStatuses[j] = dayData[j].savedStatus;
    if (dayData[j].edited && (dayData[j].savedStatus === 'draft' || dayData[j].savedStatus === 'rejected')) {
      dayData[j].submitting = true;
      dayData[j].savedStatus = 'submitted';
      submittingDays.push(j);
    }
  }
  renderWeek();

  var btn = document.getElementById('submitWeekBtn');
  var submitBtnText = document.getElementById('submitBtnText');
  var actionText = isResubmission ? '再申請' : '申請';
  if (submitBtnText) {
    submitBtnText.innerHTML = '<div class="flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>' + actionText + '中...</div>';
  }
  btn.disabled   = true;
  btn.classList.add('opacity-75', 'cursor-not-allowed');

  google.script.run
    .withSuccessHandler(function (r) {
      // 申請中フラグをクリアする
      submittingDays.forEach(function(j) { dayData[j].submitting = false; });
      if (r && r.error) {
        // エラー時に楽観的ステータスを元に戻す
        for (var rv = 0; rv < 7; rv++) { dayData[rv].savedStatus = prevStatuses[rv]; }
        renderWeek();
        // 詳細パネルが処理中スピナーを表示している場合はリセットする
        if (document.getElementById('detailDateLabel').textContent === '処理中...') {
          selectedDayIdx = null;
          document.getElementById('detailDateLabel').textContent = '日を選択してください';
          document.getElementById('detailPanel').innerHTML =
            '<p class="text-sm text-slate-400">左のカレンダーから申請する日を選択してください。</p>';
        }
        if (submitBtnText) submitBtnText.textContent = actionText;
        btn.disabled  = false;
        btn.classList.remove('opacity-75', 'cursor-not-allowed');
        showToast('⚠️ エラー: ' + r.error, false);
        return;
      }
      
      var count = (r.reports && r.reports.length) ? r.reports.length : 0;
      if (count > 0) {
        showToast('✅ ' + count + '日分の' + actionText + 'を送信しました（申請中）', true);
      }
      // サーバー申請確認済み: ボタンを即座に元に戻し、楽観更新のdayDataで再描画（追加取得不要）
      btn.disabled = false;
      btn.classList.remove('opacity-75', 'cursor-not-allowed');
      if (submitBtnText) submitBtnText.textContent = actionText;
      renderWeek();
      // 詳細パネルが処理中スピナーを表示している場合はリセットする
      if (document.getElementById('detailDateLabel').textContent === '処理中...') {
        selectedDayIdx = null;
        document.getElementById('detailDateLabel').textContent = '日を選択してください';
        document.getElementById('detailPanel').innerHTML =
          '<p class="text-sm text-slate-400">左のカレンダーから申請する日を選択してください。</p>';
      }
    })
    .withFailureHandler(function () {
      // 申請中フラグをクリアし、楽観的ステータスを元に戻す
      submittingDays.forEach(function(j) { dayData[j].submitting = false; });
      for (var rv = 0; rv < 7; rv++) { dayData[rv].savedStatus = prevStatuses[rv]; }
      renderWeek();
      // 詳細パネルが処理中スピナーを表示している場合はリセットする
      if (document.getElementById('detailDateLabel').textContent === '処理中...') {
        selectedDayIdx = null;
        document.getElementById('detailDateLabel').textContent = '日を選択してください';
        document.getElementById('detailPanel').innerHTML =
          '<p class="text-sm text-slate-400">左のカレンダーから申請する日を選択してください。</p>';
      }
      if (submitBtnText) submitBtnText.textContent = actionText;
      btn.disabled  = false;
      btn.classList.remove('opacity-75', 'cursor-not-allowed');
      showToast('⚠️ 申請に失敗しました。もう一度お試しください。', false);
    })
    .submitWeekReport(weekPayload);
}

// ── Withdraw all submitted days for the current week ─────────
function withdrawSubmittedWeek() {
  var offset = parseInt(weekSel.value) || 0;
  var sun    = getSundayOfWeek(offset);
  var sat    = new Date(sun); sat.setDate(sun.getDate() + 6);

  var submittedDays = [];
  for (var wi = 0; wi < 7; wi++) {
    // 拒否够または二重クリックを防ぐため已に取り下げ処理中の日は除外する
    if (dayData[wi].savedStatus === 'submitted' && !dayData[wi].withdrawing) {
      var wd = new Date(sun); wd.setDate(sun.getDate() + wi);
      submittedDays.push({ idx: wi, dateStr: isoDate(wd) });
    }
  }
  if (submittedDays.length === 0) {
    showToast('取り下げる申請がありません', false);
    return;
  }
  if (!confirm('申請中の ' + submittedDays.length + '日分 を取り下げますか？\n\nこの操作は取り消せません。')) {
    return;
  }

  var btn = document.getElementById('submitWeekBtn');
  var submitBtnText = document.getElementById('submitBtnText');
  if (submitBtnText) submitBtnText.innerHTML =
    '<div class="flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>取り下げ中...</div>';
  if (btn) { btn.disabled = true; btn.classList.add('opacity-75', 'cursor-not-allowed'); }

  var errors  = [];
  var pending = submittedDays.length;
  var sunStr  = isoDate(sun);
  var satStr  = isoDate(sat);

  // ── Show 取り下げ中 spinner on each card while server processes ──
  submittedDays.forEach(function(day) {
    dayData[day.idx].withdrawing = true;
  });
  renderWeek();

  function _onAllWithdrawn() {
    // 成功した日を即座に「作製中」に切り替える（ブロッキングなし）
    submittedDays.forEach(function(sd) {
      var hadError = errors.some(function(e) { return e.indexOf(sd.dateStr) === 0; });
      dayData[sd.idx].withdrawing = false;
      if (!hadError) {
        dayData[sd.idx].savedStatus = 'draft';
        dayData[sd.idx].edited      = true;
      }
    });
    // myReports を同期して renderWeek() のマージロジックを一致させる
    for (var mr0 = 0; mr0 < myReports.length; mr0++) {
      if (myReports[mr0].start_date === sunStr && myReports[mr0].end_date === satStr && myReports[mr0].tasks) {
        myReports[mr0].tasks.forEach(function(t) {
          submittedDays.forEach(function(sd) {
            if (sd.dateStr === t.date) {
              var hadError = errors.some(function(e) { return e.indexOf(sd.dateStr) === 0; });
              t.status = hadError ? 'submitted' : 'draft';
            }
          });
        });
        break;
      }
    }
    renderWeek();
    // 詳細パネルが処理中スピナーを表示している場合はリセットする
    if (document.getElementById('detailDateLabel').textContent === '処理中...') {
      selectedDayIdx = null;
      document.getElementById('detailDateLabel').textContent = '日を選択してください';
      document.getElementById('detailPanel').innerHTML =
        '<p class="text-sm text-slate-400">左のカレンダーから申請する日を選択してください。</p>';
    }
    showToast(
      errors.length > 0
        ? '⚠️ 一部の取り下げに失敗しました'
        : '✅ ' + submittedDays.length + '日分の申請を取り下げました',
      errors.length === 0
    );
  }

  submittedDays.forEach(function (day) {
    var payload = {
      startDate: sunStr,
      endDate:   satStr,
      date:      day.dateStr,
    };

    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.error) {
          // Clear loading state for this day on error so it reverts to 申請中
          dayData[day.idx].withdrawing = false;
          errors.push(day.dateStr + ': ' + r.error);
        }
        // On success: keep withdrawing=true until the user dismisses the alert
        pending--;
        if (pending === 0) _onAllWithdrawn();
      })
      .withFailureHandler(function (err) {
        // Clear loading state for this day on error so it reverts to 申請中
        dayData[day.idx].withdrawing = false;
        errors.push(day.dateStr + ': ' + (err && err.message ? err.message : '不明なエラー'));
        pending--;
        if (pending === 0) _onAllWithdrawn();
      })
      .withdrawTeleworkDay(payload);
  });
}

// ── Logout ────────────────────────────────────────────────────
function logout() {
  document.getElementById('pageLoader').classList.remove('hidden');
  google.script.run
    .withSuccessHandler(function (r) { window.top.location.href = r.redirectUrl; })
    .logoutUser();
}
